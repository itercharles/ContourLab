id: ISO_14971
title: Medical devices - Application of risk management to medical devices
type: standard
version: "2019"
policies:

  # -----------------------------------------------------------------------
  # Clause 4 — General requirements for risk management
  # -----------------------------------------------------------------------

  # 4.1 — Risk management system
  - id: "4.1.a"
    section: "4.1"
    text: "The organization shall establish, document, implement, maintain, and improve throughout the product lifetime a risk management system for which documented risk management policies shall be in place."
    status: "approved"
    automation:
      check: "item_existence"
      params:
        type_code: "RISK"

  - id: "4.1.b"
    section: "4.1"
    text: "Top management shall define and document a policy for determining criteria for risk acceptability."
    status: "approved"
    automation:
      check: "document_semantic"
      params:
        doc_id: "risk_management_plan"
        requirement: "The document must define criteria for risk acceptability, typically expressed as a risk matrix, numerical thresholds, or qualitative levels (e.g. Acceptable / ALARP / Unacceptable) that management has approved."

  # 4.2 — Management responsibilities
  - id: "4.2.a"
    section: "4.2"
    text: "Top management shall provide evidence of commitment to the risk management process by ensuring that appropriate resources are available."
    status: "approved"
    manual: true
    evidence_guidance: >
      Confirm that the risk management plan names a responsible person
      (risk manager or equivalent) and that the plan is signed/approved
      by top management. Records of resource allocation (e.g. personnel
      assignments, budget) should be available in the DHF or QMS.

  # 4.3 — Competence of personnel
  - id: "4.3.a"
    section: "4.3"
    text: "Personnel performing risk management activities shall be competent on the basis of appropriate education, training, skill, or experience."
    status: "approved"
    manual: true
    evidence_guidance: >
      Provide training records or competency matrices for all personnel
      listed in the risk management plan. Evidence may include CVs,
      certificates, or signed competency declarations.

  # 4.4 — Risk management plan
  - id: "4.4.a"
    section: "4.4"
    text: "A risk management plan shall be established for the medical device."
    status: "approved"
    automation:
      check: "file_existence"
      params:
        path: "documents/plans/risk_management_plan.md"

  - id: "4.4.b"
    section: "4.4"
    text: "The risk management plan shall define the scope of the risk management activities, including the device life-cycle phases."
    status: "approved"
    automation:
      check: "document_semantic"
      params:
        doc_id: "risk_management_plan"
        requirement: "The document must define the scope of risk management activities, identifying which phases of the device lifecycle (e.g. design, development, production, post-market) are covered."

  - id: "4.4.c"
    section: "4.4"
    text: "The risk management plan shall reference the intended use and reasonably foreseeable misuse of the device."
    status: "approved"
    automation:
      check: "document_content"
      params:
        doc_id: "risk_management_plan"
        keywords: ["intended use", "misuse"]

  # 4.5 — Risk management file
  - id: "4.5.a"
    section: "4.5"
    text: "A risk management file shall be established and maintained. All records and documents produced by risk management activities shall be included or referenced."
    status: "approved"
    automation:
      check: "item_existence"
      params:
        type_code: "RISK"

  # -----------------------------------------------------------------------
  # Clause 5 — Risk analysis
  # -----------------------------------------------------------------------

  # 5.1 — Risk analysis process
  - id: "5.1.a"
    section: "5.1"
    text: "A risk analysis shall be performed for the medical device."
    status: "approved"
    automation:
      check: "item_existence"
      params:
        type_code: "RISK"

  # 5.2 — Intended use and reasonably foreseeable misuse
  - id: "5.2.a"
    section: "5.2"
    text: "The intended use and reasonably foreseeable misuse of the medical device shall be documented."
    status: "approved"
    automation:
      check: "item_existence"
      params:
        type_code: "UC"

  - id: "5.2.b"
    section: "5.2"
    text: "Characteristics related to safety of the device shall be identified, including qualitative and quantitative characteristics that could affect the safety of the device."
    status: "approved"
    automation:
      check: "document_semantic"
      params:
        doc_id: "risk_management_plan"
        requirement: "The document must identify characteristics of the medical device that could affect its safety, such as device parameters, environmental conditions, user population, or operational limits."

  # 5.3 — Hazard identification
  - id: "5.3.a"
    section: "5.3"
    text: "All known and foreseeable hazards associated with the medical device shall be identified and recorded."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RISK"
        attribute: "hazard"

  - id: "5.3.b"
    section: "5.3"
    text: "Hazardous situations arising from the identified hazards shall be identified."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RISK"
        attribute: "cause"

  - id: "5.3.c"
    section: "5.3"
    text: "The sequence of events or hazardous situations that could lead to harm shall be documented for each hazard."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RISK"
        attribute: "effect"

  # 5.4 — Risk estimation
  - id: "5.4.a"
    section: "5.4"
    text: "For each hazardous situation, the risk shall be estimated using available information or data."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RISK"
        attribute: "severity_pre"

  - id: "5.4.b"
    section: "5.4"
    text: "The probability of occurrence of harm shall be estimated for each hazardous situation."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RISK"
        attribute: "probability_pre"

  # -----------------------------------------------------------------------
  # Clause 6 — Risk evaluation
  # -----------------------------------------------------------------------

  - id: "6.a"
    section: "6"
    text: "Each identified risk shall be evaluated using the defined risk acceptability criteria."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RISK"
        attribute: "risk_acceptability"

  - id: "6.b"
    section: "6"
    text: "Risks that do not meet the acceptability criteria shall require risk control."
    status: "approved"
    automation:
      check: "trace_coverage"
      params:
        source_type: "RISK"
        target_type: "RCM"
        min_coverage: 0.8

  # -----------------------------------------------------------------------
  # Clause 7 — Risk control
  # -----------------------------------------------------------------------

  # 7.1 — Risk control option analysis
  - id: "7.1.a"
    section: "7.1"
    text: "Risk control measures shall be identified and documented."
    status: "approved"
    automation:
      check: "item_existence"
      params:
        type_code: "RCM"

  - id: "7.1.b"
    section: "7.1"
    text: "Risk control options shall be selected in order of priority: inherently safe design, protective measures, information for safety."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RCM"
        attribute: "control_type"

  # 7.2 — Implementation of risk control measures
  - id: "7.2.a"
    section: "7.2"
    text: "Risk control measures shall be implemented."
    status: "approved"
    automation:
      check: "attribute_value"
      params:
        type_code: "RCM"
        attribute: "implementation_status"
        expected_value: "Implemented"

  - id: "7.2.b"
    section: "7.2"
    text: "Implemented risk control measures shall trace to system requirements."
    status: "approved"
    automation:
      check: "trace_coverage"
      params:
        source_type: "RCM"
        target_type: "SYS"
        min_coverage: 1.0

  # 7.3 — Residual risk evaluation
  - id: "7.3.a"
    section: "7.3"
    text: "Residual risk shall be estimated and evaluated after implementation of risk control measures."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RISK"
        attribute: "severity_post"

  - id: "7.3.b"
    section: "7.3"
    text: "The probability of occurrence of harm after risk control shall be estimated."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RISK"
        attribute: "probability_post"

  - id: "7.3.c"
    section: "7.3"
    text: "Each residual risk shall be evaluated against the defined acceptability criteria."
    status: "approved"
    manual: true
    evidence_guidance: >
      Confirm that a risk management report or residual risk summary
      exists that evaluates all post-mitigation risk levels (severity_post
      x probability_post) against the acceptance criteria defined in the
      risk management plan. This review requires human judgement and
      cannot be inferred from field population alone.

  # 7.4 — Benefit-risk analysis
  - id: "7.4.a"
    section: "7.4"
    text: "If residual risk is judged unacceptable, a benefit-risk analysis shall be conducted."
    status: "approved"
    automation:
      check: "attribute_presence"
      params:
        type_code: "RISK"
        attribute: "risk_benefit"

  # 7.5 — Risks arising from risk control measures
  - id: "7.5.a"
    section: "7.5"
    text: "New hazards or hazardous situations introduced by risk control measures shall be identified and managed."
    status: "approved"
    manual: true
    evidence_guidance: >
      Review each RCM item and confirm that secondary hazards introduced
      by the control measure have been evaluated. Document this review
      in the risk management report, noting either that no new hazards
      were introduced or referencing the new RISK items created for
      any secondary hazards found.

  # 7.6 — Completeness of risk control
  - id: "7.6.a"
    section: "7.6"
    text: "Every risk control measure shall trace back to a specific identified risk."
    status: "approved"
    automation:
      check: "trace_coverage"
      params:
        source_type: "RCM"
        target_type: "RISK"
        min_coverage: 1.0

  - id: "7.6.b"
    section: "7.6"
    text: "Risk control measures shall be verified as effective."
    status: "approved"
    automation:
      check: "attribute_value"
      params:
        type_code: "RCM"
        attribute: "verification_status"
        expected_value: "Verified"

  # -----------------------------------------------------------------------
  # Clause 8 — Evaluation of overall residual risk
  # -----------------------------------------------------------------------

  - id: "8.a"
    section: "8"
    text: "The overall residual risk shall be evaluated using the criteria defined in the risk management plan."
    status: "approved"
    manual: true
    evidence_guidance: >
      Provide a signed risk management report that summarises the overall
      residual risk across all hazardous situations and confirms the
      overall residual risk is acceptable against the criteria defined
      in the risk management plan. This requires a documented human
      decision — the PolicyEngine can confirm individual risk fields
      are populated but cannot make the holistic benefit-risk judgement.

  - id: "8.b"
    section: "8"
    text: "If the overall residual risk is not acceptable, a benefit-risk analysis shall be conducted and documented."
    status: "approved"
    manual: true
    evidence_guidance: >
      If any RISK item carries risk_acceptability = 'Unacceptable' after
      mitigation, a formal benefit-risk analysis document must exist in
      the risk management file explaining why the residual risk is
      outweighed by the benefit of the device.

  # -----------------------------------------------------------------------
  # Clause 9 — Risk management review
  # -----------------------------------------------------------------------

  - id: "9.a"
    section: "9"
    text: "A risk management review shall be conducted prior to releasing the device."
    status: "approved"
    automation:
      check: "item_existence"
      params:
        type_code: "REL"

  - id: "9.b"
    section: "9"
    text: "The risk management review shall confirm that the risk management plan has been carried out appropriately."
    status: "approved"
    manual: true
    evidence_guidance: >
      Provide a signed risk management report or review record confirming
      that all activities in the risk management plan have been completed,
      all identified hazards have been evaluated, and all required risk
      control measures have been implemented and verified. This review
      requires a documented human decision — it cannot be inferred from
      DHF item fields alone.

  - id: "9.c"
    section: "9"
    text: "The risk management review shall confirm that overall residual risk is acceptable."
    status: "approved"
    manual: true
    evidence_guidance: >
      The risk management report must include an explicit statement,
      signed by the designated risk management authority, confirming
      that the overall residual risk of the device is acceptable.
      This is a mandatory human decision record — not derivable from
      field population checks.

  # -----------------------------------------------------------------------
  # Clause 10 — Production and post-production activities
  # -----------------------------------------------------------------------

  - id: "10.a"
    section: "10"
    text: "A system shall be in place to collect and review information from the production and post-production phases."
    status: "approved"
    manual: true
    evidence_guidance: >
      Reference the post-market surveillance plan or SOP that describes
      how complaints, incidents, and field feedback are collected,
      reviewed for safety relevance, and fed back into the risk
      management process.

  - id: "10.b"
    section: "10"
    text: "If information collected from production or post-production phases indicates a previously unidentified hazard or hazardous situation, or an unacceptable increase in risk, this information shall be fed back into the risk management process."
    status: "approved"
    automation:
      check: "item_existence"
      params:
        type_code: "DEF"

  - id: "10.c"
    section: "10"
    text: "Post-production information shall be reviewed to determine if corrective or preventive action is needed and change requests shall be raised."
    status: "approved"
    automation:
      check: "item_existence"
      params:
        type_code: "CR"
