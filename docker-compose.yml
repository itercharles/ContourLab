services:
  dicom-repo:
    image: orthancteam/orthanc:latest
    container_name: webtps-orthanc
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - ./docker/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc-db:/var/lib/orthanc/db
    restart: unless-stopped

volumes:
  orthanc-db:
