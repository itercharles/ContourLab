services:
  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    image: webtps-client:latest
    container_name: webtps-client
    ports:
      - "3001:3001"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: webtps-api:latest
    container_name: webtps-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:4000
      GITHUB_TOKEN: ${ISSUES_TOKEN}
      CONTOURLAB_AUTOCONTOUR_SERVICE_BASE_URL: http://autocontour-service:4010
    ports:
      - "4001:4000"
    restart: unless-stopped
    depends_on:
      - autocontour-service

  autocontour-service:
    build:
      context: .
      dockerfile: apps/autocontour-service/Dockerfile
    image: contourlab-autocontour-service:latest
    container_name: contourlab-autocontour-service
    environment:
      ASPNETCORE_URLS: http://+:4010
    ports:
      - "4010:4010"
    restart: unless-stopped

  dicom-repo:
    image: orthancteam/orthanc:latest
    container_name: webtps-orthanc
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - ./docker/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ${CONTOURLAB_ORTHANC_DATA_DIR:-./deploy-data/orthanc-db}:/var/lib/orthanc/db
    restart: unless-stopped
