global_lifecycle:
  states:
  - id: draft
    label: Draft
    action_label: Create
    icon: 📝
    color: warning
    is_initial: true
  - id: in_review
    label: In Review
    action_label: Submit for Review
    icon: 🔍
    color: info
  - id: open
    label: Open
    action_label: Submit
    icon: 📂
    color: info
  - id: in_progress
    label: In Progress
    action_label: Start Work
    icon: 🔧
    color: warning
  - id: resolved
    label: Resolved
    action_label: Resolve
    icon: ✅
    color: success
  - id: approved
    label: Approved
    action_label: Approve
    icon: ✅
    color: success
  - id: designing
    label: Designing
    action_label: Start Design
    icon: 📐
    color: info
  - id: implementing
    label: Implementing
    action_label: Start Implementation
    icon: 🔧
    color: warning
  - id: completed
    label: Completed
    action_label: Complete
    icon: 🎯
    color: success
  - id: verified
    label: Verified
    action_label: Verify
    icon: ✓
    color: success
  - id: validated
    label: Validated
    action_label: Validate
    icon: ✓✓
    color: success
  - id: released
    label: Released
    action_label: Release
    icon: 🚀
    color: success
    is_stable: true
  - id: cancelled
    label: Cancelled
    action_label: Cancel
    icon: 🚫
    color: secondary
    is_stable: true
  - id: retired
    label: Retired
    action_label: Retire
    icon: 📦
    color: secondary
    is_stable: true
  - id: closed
    label: Closed
    action_label: Close
    icon: 🚫
    color: secondary
    is_stable: true

traceability_matrices:
- name: Complete Requirements Chain
  description: Full traceability from use cases through all requirement levels to detailed design
  path:
  - UC
  - CRS
  - SYS
  - SRS
  - SWDD
- name: System Requirements to System Architecture
  description: System requirements and their architectural designs
  path:
  - SYS
  - SYSARCH
- name: Module to Detailed Design
  description: Every software module has at least one detailed design item
  path:
  - MODULE
  - SWDD
- name: Risk to Control Measures
  description: Risks to risk control measures
  path:
  - RISK
  - RCM

required_traceability:
- source_type: SRS
  direction: upstream
  field: derives_from
  target_type: SYS
  min_count: 1
- source_type: SWDD
  direction: upstream
  field: implements
  target_type: SRS
  min_count: 1
- source_type: SWDD
  direction: upstream
  field: module
  target_type: MODULE
  min_count: 1
- source_type: RCM
  direction: upstream
  field: mitigates
  target_type: RISK
  min_count: 1
- source_type: RCM
  direction: upstream
  field: implements
  target_type: SYS
  min_count: 1
- source_type: CRS
  direction: downstream
  target_type: SYS
  min_count: 1

document_specifications:
  UC:
    template: requirements_specification.md.j2
    output: DHF/documents/specs/Use_Case_Specification.md
    doc_type_name: Use Case
  CRS:
    template: crs_specification.md.j2
    output: DHF/documents/specs/Customer_Requirement_Specification.md
    doc_type_name: Customer Requirement
  SYS:
    template: requirements_specification.md.j2
    output: DHF/documents/specs/System_Requirement_Specification.md
    doc_type_name: System Requirement
  SRS:
    template: requirements_specification.md.j2
    output: DHF/documents/specs/Software_Requirement_Specification.md
    doc_type_name: Software Requirement Specification
  MODULE:
    template: software_design_document.md.j2
    output: DHF/documents/specs/Software_Design_Document.md
    doc_type_name: Software Module
  SWDD:
    template: requirements_specification.md.j2
    output: DHF/documents/specs/Software_Detailed_Design_Document.md
    doc_type_name: Software Detailed Design Document
  SYSARCH:
    template: architecture_specification.md.j2
    output: DHF/documents/specs/System_Architecture_Specification.md
    doc_type_name: System Architecture Specification
  RISK:
    template: risk_specification.md.j2
    output: DHF/documents/specs/Risk_Analysis_Specification.md
    doc_type_name: Risk Analysis
  RCM:
    template: rcm_specification.md.j2
    output: DHF/documents/specs/Risk_Control_Measures_Specification.md
    doc_type_name: Risk Control Measures
  CR:
    template: change_request_specification.md.j2
    output: DHF/documents/specs/Change_Request_Specification.md
    doc_type_name: Change Request

test_integration:
  result_store:
    path: test-results/results.yaml
  manual:
    require_verified_by: true
    require_verification_date: true
