id: SYS-012
satisfies:
- CRS-009
title: System shall display persistent workspace context
content: 'The system shall continuously display the active patient, active image series,

  active RTSTRUCT or structure set source, and repository synchronization state

  in the top operation bar throughout all clinical workflow interactions. The

  display shall update immediately when any of these context values change.'
category: Functional
verification_method:
- Test
- Demonstration
critical_safety: false
verification_criteria: When a DICOM series is active, the top operation bar renders
  the patient name, active series description, active RTSTRUCT label, and repository
  sync state. Each field reflects the current store value within one render cycle
  of any context change. When no series is active, all fields show their defined placeholder
  values.
