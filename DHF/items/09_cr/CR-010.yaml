id: CR-010
title: Rename "Issues" page to "Change Requests"
type: CR
description: "Many users interpret \"Issues\" as a bug tracker only. The page accepts\
  \ bugs, feature requests, and improvement proposals — renaming it to \"Change Requests\"\
  \ aligns with IEC 62304 change-control language and removes the ambiguity.\n\n**Affected\
  \ UI locations:**\n- Left sidebar nav item label (currently \"Issues\")  \n- Page\
  \ heading inside the Issues page\n\n**Expected outcome:** The nav label and page\
  \ heading read \"Change Requests\" so users understand all types of requests are\
  \ welcome.\n\nSource issue: https://github.com/itercharles/WebTPS/issues/63"
justification: Maintainer assigned this issue to the active release milestone, indicating
  it is accepted for CR intake.
priority: Medium
requested_by: CharlesChenElekta
target_version: 2026-W19
