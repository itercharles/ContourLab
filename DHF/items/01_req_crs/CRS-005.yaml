id: CRS-005
title: Clinicians shall push the active structure set to the DICOM repository
content: |-
  As a physician or dosimetrist, I need to save the current structure set back
  to the DICOM repository as an RTSTRUCT object so it is available to other
  systems and users in the clinical workflow.
user_group: Physician / Dosimetrist
derives_from:
  - UC-004
testing: |
  T1: Given unsynchronized changes, the Save Changes action triggers export and upload and clears the repository dirty state.
priority: Critical
