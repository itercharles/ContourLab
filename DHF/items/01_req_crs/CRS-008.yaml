id: CRS-008
title: Clinicians shall select a patient and study from the DICOMweb repository browser
content: |-
  As a radiation therapist or physician, I need to browse available patients in
  the connected DICOM repository, search and filter by clinical identifiers, and
  activate a patient and image series as my working context.
user_group: Radiation Therapist / Physician
derives_from:
  - UC-005
testing: |
  T1: Given the workspace, the clinician can open the patient browser and it shows a search input and filter tabs.
  T2: Given a search query entered, the search input reflects the value.
  T3: Given the patient browser is open, the clinician can close it with the close button.
priority: Critical
