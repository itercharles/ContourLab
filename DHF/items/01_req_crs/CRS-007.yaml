id: CRS-007
title: Clinicians shall compare a repository RTSTRUCT version with the active workspace
content: |-
  As a physician or dosimetrist, I need to compare a repository RTSTRUCT object
  with the current workspace structure set to understand what changed between
  versions without disrupting my active editing session.
user_group: Physician / Dosimetrist
derives_from:
  - UC-004
testing: |
  T1: Given two structure set versions, compareStructureSets reports added, removed, and changed structures with volume and slice-count deltas.
priority: Medium
