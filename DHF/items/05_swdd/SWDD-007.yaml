id: SWDD-007
title: GitHub Actions CI pipeline and local smoke verification
content: |-
  The repository CI workflow is defined in `.github/workflows/ci-pipeline.yml`
  and is partitioned into four phases. Phase 1 installs JavaScript
  dependencies and runs frontend lint, typecheck, test, and build against
  `@contourlab/client`. Phase 2 uses `actions/setup-dotnet` to restore and build
  `apps/api/api.csproj`, matching the actual ASP.NET API project layout.
  Phase 3 typechecks and builds `@contourlab/shared-types`.

  Phase 4 is an integration smoke job gated on the successful completion of
  the first three phases. It installs Node.js, pnpm, and .NET, restores the
  API, starts the local Orthanc DICOM repository with `pnpm repo:up`, starts
  the API and frontend processes, and runs `pnpm local:doctor` to verify the
  reachable ports and HTTP health endpoints for the frontend, API, and
  repository. On failure, the workflow uploads API and frontend logs as build
  artifacts and always stops Docker services with `pnpm local:down`.
implements: [SRS-017]
module: [MODULE-009]
