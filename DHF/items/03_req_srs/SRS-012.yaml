id: SRS-012
title: Software shall keep contour overlays registered during viewport transforms
content: |-
  Contour overlays displayed on the axial viewport shall remain spatially
  registered to the underlying image when the user pans, zooms, scrolls, or the
  viewport canvas position changes. Overlay rendering shall re-project stored
  world-coordinate contour points to viewport canvas coordinates after relevant
  camera, zoom, or canvas geometry changes.
  Sagittal and coronal MPR viewports shall display contour intersection lines
  where stored axial contour polygons cross the current sagittal or coronal
  plane. Editing interactions shall remain restricted to the axial contour
  overlay until non-axial editing tools are explicitly implemented.
derives_from: [SYS-002]
verification_method: [Test, Demonstration]
testing: |
  T1: Given viewport camera, zoom, or canvas position changes, getViewportTransformSignature returns a different value for each distinct transform.
  T2: Given axial contour polygons and a sagittal plane value, intersectContourWithPlane returns the correct intersection points.
  T3: Given axial contour polygons and a coronal plane value, intersectContourWithPlane returns the correct intersection points.
  T4: Given cross-plane contour slices, buildCrossPlaneBoundaryPath produces the correct SVG boundary path string.
critical_safety: true
