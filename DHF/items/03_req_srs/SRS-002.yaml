id: SRS-002
title: Software shall construct WADO-RS image identifiers and register metadata for Cornerstone3D
content: |-
  For each SOP instance returned by repository metadata, the software shall
  construct a WADO-RS frame image identifier, register the corresponding
  DICOMweb metadata with the Cornerstone WADO-RS metadata manager, and sort
  instances within the selected series by instance number, falling back to
  slice location where required.
derives_from: [SYS-001]
verification_method: [Test]
testing: |
  T1: Given a configured DICOMweb base URL, the effective endpoint is returned and trailing slashes are normalised.
  T2: Given a localhost Orthanc URL, the client routes through the same-origin proxy path.
  T3: Given a multipart WADO-RS response, the DICOM part payload bytes are extracted correctly.
critical_safety: false
