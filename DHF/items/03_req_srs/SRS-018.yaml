id: SRS-018
derives_from:
- SYS-002
title: Software shall render a context menu on viewport right-click with Maximize
  View option
content: When a user right-clicks on a viewport canvas, a context menu shall appear
  with text "Maximize View" (or "Restore View" if the viewport is already maximized).
  The menu shall disappear when clicked outside or when an option is selected. The
  menu shall be positioned near the cursor location.
verification_method:
- Test
testing: |
  T1: Given isMaximized is false, the context menu renders "Maximize View".
  T2: Given isMaximized is true, the context menu renders "Restore View".
  T3: Given a click on "Maximize View", onMaximize is called with the viewport orientation and the menu closes.
  T4: Given a click on "Restore View", onMaximize is called with null and the menu closes.
  T5: Given a mousedown outside the menu, the menu closes.
critical_safety: false
type: SRS
