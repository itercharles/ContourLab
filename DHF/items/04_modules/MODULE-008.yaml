id: MODULE-008
title: ViewportUI
content: 'Manages viewport layout state, UI controls overlaid on the rendering canvas,
  and persistent patient context display in the primary toolbar.


  Responsibilities:

  - Maximize/restore viewport feature (toggling between three-pane grid and single-viewport
  fullscreen)

  - Context menu rendering on viewport right-click

  - Keyboard shortcuts (Escape to restore layout)

  - Patient name display in the primary toolbar header row, adjacent to the brand
  mark


  Interfaces: reads uiStore.maximizedViewport (writes); reads volumeStore.loadedSeries
  and volumeStore.activeSeriesUID (read-only); listens to RenderingEngine canvas events
  (onContextMenu); resets layout on patient change.'
type: MODULE
