name: medharness setup
description: Install Python and medharness with pip cache. Single source of truth for the medharness version.

inputs:
  extras:
    description: Optional extras spec, e.g. "[docs]" for WeasyPrint PDF support
    required: false
    default: ''
  python-version:
    description: Python interpreter version
    required: false
    default: '3.11'
  version:
    description: PyPI version to install when no git ref override is set
    required: false
    default: '0.3.5'
  git-ref:
    description: Optional MedHarness git ref to install for downstream validation
    required: false
    default: 'codex/cr-a-structured-analyze-output'

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Install medharness
      shell: bash
      run: |
        if [ -n "${{ inputs.git-ref }}" ]; then
          pip install "medharness${{ inputs.extras }} @ git+https://github.com/itercharles/MedHarness.git@${{ inputs.git-ref }}"
        else
          pip install "medharness${{ inputs.extras }}==${{ inputs.version }}"
        fi
