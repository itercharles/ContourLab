name: Install Playwright (Chromium)
description: Cache-aware Chromium install for SYS and CRS test jobs.

runs:
  using: composite
  steps:
    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/client/package.json') }}

    - name: Install Playwright browsers
      shell: bash
      run: pnpm --filter @contourlab/client exec playwright install chromium --with-deps
