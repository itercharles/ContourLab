name: Install Playwright (Chromium)
description: Cache-aware Chromium install for SYS and CRS test jobs.

runs:
  using: composite
  steps:
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ hashFiles('apps/client/package.json') }}

    - name: Install Playwright browsers
      shell: bash
      run: pnpm --filter @webtps/client exec playwright install chromium --with-deps
