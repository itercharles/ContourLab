name: CR Agent Setup
description: medharness + Node + Claude Code for CR lifecycle jobs.

runs:
  using: composite
  steps:
    - uses: ./.github/actions/medharness-setup

    - uses: actions/cache@v5
      with:
        path: ~/.npm
        key: npm-claude-code-${{ runner.os }}

    - uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install Claude Code
      shell: bash
      run: npm install -g @anthropic-ai/claude-code
