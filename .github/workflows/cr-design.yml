name: WebTPS CR Design Automation

run-name: CR design | ${{ github.event.pull_request.head.ref || github.event.client_payload.cr_id || github.ref_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  repository_dispatch:
    types: [cr-impl-cancelled]
  pull_request:
    types: [closed]
    branches: [main]
  pull_request_review:
    types: [submitted]

jobs:
  design:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'spec/CR-')) ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'design/CR-')) ||
      (github.event_name == 'pull_request' && !github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'design/CR-')) ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested' && startsWith(github.event.pull_request.head.ref, 'design/CR-'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine mode and CR ID
        id: ctx
        env:
          EVENT: ${{ github.event_name }}
          MERGED: ${{ github.event.pull_request.merged }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          DISPATCH_CR_ID: ${{ github.event.client_payload.cr_id }}
        run: |
          if [ "$EVENT" = "repository_dispatch" ]; then
            CR_ID=$DISPATCH_CR_ID
            echo "mode=impl_cancel" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "pull_request" ] && [ "$MERGED" = "true" ] && [[ "$HEAD_REF" == spec/* ]]; then
            CR_ID=$(echo "$HEAD_REF" | grep -oE 'CR-[0-9]+')
            echo "mode=new" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "pull_request" ] && [ "$MERGED" = "false" ]; then
            echo "mode=cancel" >> "$GITHUB_OUTPUT"
            CR_ID=$(echo "$HEAD_REF" | grep -oE 'CR-[0-9]+')
          elif [ "$EVENT" = "pull_request" ] && [ "$MERGED" = "true" ] && [[ "$HEAD_REF" == design/* ]]; then
            CR_ID=$(echo "$HEAD_REF" | grep -oE 'CR-[0-9]+')
            echo "mode=dispatch" >> "$GITHUB_OUTPUT"
          else
            CR_ID=$(echo "$HEAD_REF" | grep -oE 'CR-[0-9]+')
            echo "mode=iterate" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi
          echo "cr_id=$CR_ID" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install medharness
        run: pip install medharness

      - name: Cancel CR
        if: steps.ctx.outputs.mode == 'cancel' || steps.ctx.outputs.mode == 'impl_cancel'
        run: |
          git checkout main
          python -m medharness --dhf DHF dhf item transition \
            "${{ steps.ctx.outputs.cr_id }}" cancelled \
            --by "github-actions[bot]" --commit --push

      - name: Dispatch implementation to cr-develop
        if: steps.ctx.outputs.mode == 'dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          gh workflow run cr-develop.yml \
            --field cr_id="$CR_ID"

      - uses: actions/setup-node@v4
        if: steps.ctx.outputs.mode == 'new' || steps.ctx.outputs.mode == 'iterate'
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.ctx.outputs.mode == 'new' || steps.ctx.outputs.mode == 'iterate'
        run: npm install -g @anthropic-ai/claude-code

      - name: Transition CR to designing
        if: steps.ctx.outputs.mode == 'new'
        run: |
          python -m medharness --dhf DHF dhf item transition "${{ steps.ctx.outputs.cr_id }}" designing --by "github-actions[bot]"

      - name: Validate approved spec
        if: steps.ctx.outputs.mode == 'new'
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          python -m medharness ci validate-spec \
            --cr "$CR_ID" \
            --spec "docs/cr-specs/${CR_ID}-Spec.md" \
            --dhf DHF

      - name: Pre-compute design context
        if: steps.ctx.outputs.mode == 'new'
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          DHF_CONTEXT=$(python -m medharness --dhf DHF dhf context for-stage design \
            --cr "$CR_ID" \
            --spec "docs/cr-specs/${CR_ID}-Spec.md" 2>/dev/null || echo '{}')
          echo "DHF_CONTEXT=$DHF_CONTEXT" >> "$GITHUB_ENV"

      - name: Read session ID for iteration
        if: steps.ctx.outputs.mode == 'iterate'
        id: session
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          SESSION_ID=$(python -m medharness ci claude-session get "$PR_NUMBER" 2>/dev/null || echo "")
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"

      - name: Collect review feedback
        if: steps.ctx.outputs.mode == 'iterate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" > /tmp/review-comments.json
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" > /tmp/reviews.json

      - name: Update DHF design items
        if: steps.ctx.outputs.mode == 'new'
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DESIGN_MODEL }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
          DHF_CONTEXT: ${{ env.DHF_CONTEXT }}
        run: |
          [ -n "$ANTHROPIC_MODEL" ] || unset ANTHROPIC_MODEL
          PROMPT=$(sed "s/{{cr_id}}/$CR_ID/g" .github/prompts/cr-design.md)
          echo "=== PROMPT ===" && echo "$PROMPT" && echo "=== CLAUDE OUTPUT ==="
          SESSION_ID=$(uuidgen)
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          claude -p --dangerously-skip-permissions --session-id "$SESSION_ID" "$PROMPT" 2>&1 | tee /tmp/claude-out.txt || true

      - name: Revise DHF design items
        if: steps.ctx.outputs.mode == 'iterate'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DESIGN_MODEL }}
          SESSION_ID: ${{ steps.session.outputs.session_id }}
        run: |
          [ -n "$ANTHROPIC_MODEL" ] || unset ANTHROPIC_MODEL
          if [ -n "$SESSION_ID" ]; then
            claude --resume "$SESSION_ID" -p --dangerously-skip-permissions \
              "Revise the DHF design items on this branch based on review feedback in /tmp/review-comments.json and /tmp/reviews.json."
          else
            claude -p --dangerously-skip-permissions \
              "Revise the DHF design items on this branch based on review feedback in /tmp/review-comments.json and /tmp/reviews.json."
          fi

      - name: Commit design branch
        if: steps.ctx.outputs.mode == 'new'
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          git checkout -B "design/$CR_ID"
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DHF/
          if ! git diff --staged --quiet; then
            git commit -m "feat: design $CR_ID"
          fi
          git push --force --set-upstream origin "design/$CR_ID"

      - name: Commit revised design
        if: steps.ctx.outputs.mode == 'iterate'
        run: |
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DHF/
          if ! git diff --staged --quiet; then
            git commit -m "docs: revise design from review feedback"
            git push
          fi

      - name: Open design PR and store session ID
        if: steps.ctx.outputs.mode == 'new'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
          SESSION_ID: ${{ steps.gen.outputs.session_id }}
        run: |
          EXISTING=$(gh pr list --head "design/$CR_ID" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            PR_URL=$(gh pr create \
              --head "design/$CR_ID" \
              --base main \
              --title "design($CR_ID): DHF items update" \
              --body "Automated DHF design update for $CR_ID.")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          else
            PR_NUMBER=$EXISTING
          fi
          if [ -n "$SESSION_ID" ]; then
            python -m medharness ci claude-session put "$PR_NUMBER" "$SESSION_ID"
          fi
