name: WebTPS Product CI/CD

run-name: Product CI/CD | ${{ github.event_name }} | ${{ github.event.pull_request.title || github.event.head_commit.message || github.ref_name }}

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  actions: read

jobs:

  # ── DEVELOPMENT TESTING ────────────────────────────────────────────────────
  # Static analysis and compilation. Engineering feedback only — not compliance
  # artifacts. All three jobs run in parallel.

  dev-frontend:
    name: Dev | Frontend (lint · typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @webtps/client lint
      - run: pnpm --filter @webtps/client typecheck
      - run: pnpm --filter @webtps/client build

  dev-api:
    name: Dev | API (restore · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore apps/api/api.csproj
      - run: dotnet build apps/api/api.csproj --configuration Release --no-restore

  dev-shared-types:
    name: Dev | Shared Types (typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @webtps/shared-types typecheck
      - run: pnpm --filter @webtps/shared-types build

  dev-integration:
    name: Dev | Integration Smoke (full stack · health check)
    runs-on: ubuntu-latest
    needs: [dev-frontend, dev-api, dev-shared-types]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: pnpm install --frozen-lockfile
      - run: dotnet restore apps/api/api.csproj
      - name: Start DICOM repository
        run: pnpm repo:up
      - name: Start API
        run: pnpm api > /tmp/webtps-api.log 2>&1 &
      - name: Start frontend
        run: pnpm --dir apps/client exec vite --host 127.0.0.1 --port 3000 > /tmp/webtps-client.log 2>&1 &
      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4000/api/health > /dev/null 2>&1 && \
            curl -sf http://127.0.0.1:3000/ > /dev/null 2>&1 && \
            echo "Services ready" && break
            echo "Waiting... ($i/30)"
            sleep 3
          done
      - name: Smoke check
        run: pnpm local:doctor
      - name: Stop services
        if: always()
        run: pnpm local:down
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-integration-logs
          path: |
            /tmp/webtps-api.log
            /tmp/webtps-client.log

  # ── VERIFICATION TESTING ───────────────────────────────────────────────────
  # IEC 62304 §5.5–5.7. Formal evidence that software units and the integrated
  # system satisfy their specified requirements. Results are DHF artifacts.
  # Runs in parallel with validation testing, after dev builds pass.

  verify-srs:
    name: Verify | Test-SRS (Vitest · software requirements)
    runs-on: ubuntu-latest
    needs: [dev-frontend, dev-shared-types]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run SRS verification tests
        run: pnpm --filter @webtps/client test
      - name: Upload SRS test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-srs-junit
          path: apps/client/test-results/verification-junit.xml
          if-no-files-found: ignore

  verify-sys:
    name: Verify | Test-SYS (Playwright · system requirements)
    runs-on: ubuntu-latest
    needs: [dev-frontend, dev-api, dev-shared-types]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: pnpm install --frozen-lockfile
      - run: dotnet restore apps/api/api.csproj
      - name: Start full stack
        run: |
          pnpm repo:up
          pnpm api > /tmp/webtps-api.log 2>&1 &
          pnpm --dir apps/client exec vite --host 127.0.0.1 --port 3000 > /tmp/webtps-client.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4000/api/health > /dev/null 2>&1 && \
            curl -sf http://127.0.0.1:3000/ > /dev/null 2>&1 && break
            sleep 3
          done
      - name: Run SYS verification tests
        run: echo "Test-SYS — Playwright not yet configured"
      - name: Stop services
        if: always()
        run: pnpm local:down
      - name: Upload SYS test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-sys-junit
          path: apps/client/test-results/e2e-sys-junit.xml
          if-no-files-found: ignore
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-sys-logs
          path: |
            /tmp/webtps-api.log
            /tmp/webtps-client.log

  # ── VALIDATION TESTING ─────────────────────────────────────────────────────
  # IEC 62304 §5.8. Evidence that the system satisfies customer requirements
  # and use cases as experienced through the clinical UI. Playwright drives the
  # browser through complete clinical workflows. Runs in parallel with
  # verification testing, after dev builds pass.

  validate-crs:
    name: Validate | Test-CRS (Playwright · clinical workflows)
    runs-on: ubuntu-latest
    needs: [dev-frontend, dev-api, dev-shared-types]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: pnpm install --frozen-lockfile
      - run: dotnet restore apps/api/api.csproj
      - name: Start full stack
        run: |
          pnpm repo:up
          pnpm api > /tmp/webtps-api.log 2>&1 &
          pnpm --dir apps/client exec vite --host 127.0.0.1 --port 3000 > /tmp/webtps-client.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4000/api/health > /dev/null 2>&1 && \
            curl -sf http://127.0.0.1:3000/ > /dev/null 2>&1 && break
            sleep 3
          done
      - name: Run CRS validation tests
        run: echo "Test-CRS — Playwright not yet configured"
      - name: Stop services
        if: always()
        run: pnpm local:down
      - name: Upload CRS test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validate-crs-junit
          path: apps/client/test-results/e2e-crs-junit.xml
          if-no-files-found: ignore
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-crs-logs
          path: |
            /tmp/webtps-api.log
            /tmp/webtps-client.log

  # ── TRACEABILITY GATE ─────────────────────────────────────────────────────
  # Runs on PRs and branch pushes. This is a CI gate only: failures fail the
  # workflow. PDF evidence is generated only on main by DHF Artifacts.

  traceability:
    name: Traceability Gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out DHF repo
        uses: actions/checkout@v4
        with:
          repository: itercharles/WebTPS-DHF
          token: ${{ secrets.PRODUCT_REPO_TOKEN }}
          path: dhf

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install traceability dependencies
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ secrets.PRODUCT_REPO_TOKEN }}@github.com/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/
        run: |
          python -m pip install --upgrade pip
          pip install -r dhf/requirements.txt

      - name: Check DHF traceability
        run: |
          export PYTHONPATH="${PWD}/dhf:${PWD}/dhf/DHF"
          compliantflow --dhf dhf/DHF validate traceability

  # ── ACCEPTANCE GATE ───────────────────────────────────────────────────────
  # Runs after all development, verification, and validation phases pass.
  # On PR: this is the final gate. On main: continues to artifact generation
  # and deployment. Compliance remains a placeholder until policy checks are
  # wired in.

  compliance:
    name: Acceptance Gate (compliance placeholder)
    runs-on: ubuntu-latest
    needs: [dev-integration, verify-srs, verify-sys, validate-crs, traceability]
    steps:
      - uses: actions/checkout@v4
      - name: Acceptance gate
        run: echo "Acceptance gate — compliance checks not yet wired in"

  # ── ARTIFACTS + DEPLOY (main only) ────────────────────────────────────────
  # After acceptance passes on main: generate DHF documents, traceability PDF,
  # and deploy the application.
  # These run in parallel with each other.

  generate-artifacts:
    name: DHF Artifacts (spec PDFs · traceability PDF)
    runs-on: ubuntu-latest
    needs: [compliance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !failure() && !cancelled()
    steps:
      - name: Check out product repo
        uses: actions/checkout@v4

      - name: Check out DHF repo
        uses: actions/checkout@v4
        with:
          repository: itercharles/WebTPS-DHF
          token: ${{ secrets.PRODUCT_REPO_TOKEN }}
          path: dhf

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies for PDF export
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0

      - name: Install artifact generation dependencies
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ secrets.PRODUCT_REPO_TOKEN }}@github.com/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/
        run: |
          python -m pip install --upgrade pip
          pip install -r dhf/requirements.txt

      - name: Generate DHF specification PDFs
        run: |
          mkdir -p dhf-artifacts/specifications
          cd dhf
          PYTHONPATH=.:DHF python -m utils doc export ALL
          find /tmp -maxdepth 1 -name "*_Specification_*.pdf" -exec cp {} "$GITHUB_WORKSPACE/dhf-artifacts/specifications/" \;

      - name: Generate DHF plan PDFs
        run: |
          mkdir -p dhf-artifacts/plans
          python - <<'PY'
          import markdown
          from pathlib import Path
          from weasyprint import HTML

          dhf_docs = Path("dhf/DHF/documents")
          css_path = dhf_docs / "specs/styles/default.css"
          css = css_path.read_text(encoding="utf-8") if css_path.exists() else ""

          def to_pdf(md_path: Path, out_path: Path) -> None:
              content = md_path.read_text(encoding="utf-8")
              html = markdown.markdown(content, extensions=["tables", "fenced_code", "toc"])
              full_html = (
                  "<!DOCTYPE html><html><head><meta charset='utf-8'>"
                  f"<style>{css}</style></head><body>{html}</body></html>"
              )
              HTML(string=full_html).write_pdf(str(out_path))
              print(f"{md_path} -> {out_path}")

          for md in sorted((dhf_docs / "plans").glob("*.md")):
              to_pdf(md, Path("dhf-artifacts/plans") / f"{md.stem}.pdf")
          PY

      - name: Generate traceability PDF report
        run: |
          mkdir -p dhf-artifacts/traceability
          export PYTHONPATH="${PWD}/dhf:${PWD}/dhf/DHF"
          compliantflow --dhf dhf/DHF report traceability UC CRS SYS SRS SWDD \
            --output dhf-artifacts/traceability/Requirements_Traceability_Report.pdf

      - name: Upload DHF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dhf-artifacts
          path: dhf-artifacts/

  deploy:
    name: Deploy | Workstation (PM2)
    runs-on: self-hosted
    needs: [compliance]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !failure() && !cancelled()
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Diagnose runner & PM2 env
        shell: pwsh
        run: |
          whoami
          echo "HOME=$env:HOME"
          echo "HOMEPATH=$env:HOMEPATH"
          echo "USERPROFILE=$env:USERPROFILE"
          echo "PM2_HOME=$env:PM2_HOME"

      - name: Set HOME and PM2_HOME (Windows)
        shell: pwsh
        run: |
          $userHome  = $env:USERPROFILE
          $homedrive = Split-Path $env:USERPROFILE -Qualifier
          $homepath  = Split-Path $env:USERPROFILE -NoQualifier
          $pm2Home   = Join-Path $env:USERPROFILE ".pm2"

          New-Item -ItemType Directory -Force $pm2Home | Out-Null

          # Persist across all subsequent steps.
          "HOME=$userHome"       | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HOMEDRIVE=$homedrive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HOMEPATH=$homepath"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PM2_HOME=$pm2Home"    | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Output "HOME=$userHome"
          Write-Output "PM2_HOME=$pm2Home"

      - name: Add npm global bin to PATH
        shell: pwsh
        run: echo "$env:APPDATA\npm" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @webtps/client build

      - name: Restart frontend (PM2)
        shell: pwsh
        env:
          WEBTPS_API_PORT: 4001
        run: |
          pm2 describe webtps-client >$null 2>&1
          if ($LASTEXITCODE -eq 0) {
            pm2 restart webtps-client --update-env
          } else {
            pm2 start "pnpm --filter @webtps/client preview --host 0.0.0.0 --port 3001" --name webtps-client
          }
          pm2 save

      - name: Publish API
        run: >
          dotnet publish apps/api/api.csproj
          --configuration Release
          --output apps/api/publish

      - name: Restart API (PM2)
        shell: pwsh
        run: |
          pm2 describe webtps-api >$null 2>&1
          if ($LASTEXITCODE -eq 0) {
            pm2 restart webtps-api
          } else {
            pm2 start "dotnet apps/api/publish/WebTPS.Api.dll --urls http://0.0.0.0:4001" --name webtps-api
          }
          pm2 save

      - name: Ensure DICOM repository is running
        run: pnpm repo:up

      - name: Verify deployment
        run: pnpm local:doctor
