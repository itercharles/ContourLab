name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  actions: read

jobs:
  phase1-frontend:
    name: Phase 1 - Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @webtps/client typecheck

      - name: Test
        run: pnpm --filter @webtps/client test

      - name: Build
        run: pnpm --filter @webtps/client build

  phase2-server:
    name: Phase 2 - Server
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @webtps/server typecheck

      - name: Test
        run: pnpm --filter @webtps/server test

      - name: Build
        run: pnpm --filter @webtps/server build

  phase3-shared-types:
    name: Phase 3 - Shared Types
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared types
        run: pnpm --filter @webtps/shared-types typecheck
