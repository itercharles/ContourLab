name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  actions: read

jobs:
  phase1-frontend:
    name: Phase 1 - Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @webtps/client lint

      - name: Typecheck
        run: pnpm --filter @webtps/client typecheck

      - name: Test
        run: pnpm --filter @webtps/client test

      - name: Upload compliance test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-junit
          path: apps/client/test-results/compliantflow-junit.xml
          if-no-files-found: ignore

      - name: Build
        run: pnpm --filter @webtps/client build

  phase2-api:
    name: Phase 2 - API
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore API
        run: dotnet restore apps/api/api.csproj

      - name: Build API
        run: dotnet build apps/api/api.csproj --configuration Release --no-restore

  phase3-shared-types:
    name: Phase 3 - Shared Types
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared types
        run: pnpm --filter @webtps/shared-types typecheck

      - name: Build shared types
        run: pnpm --filter @webtps/shared-types build

  phase4-integration-smoke:
    name: Phase 4 - Integration Smoke
    runs-on: ubuntu-latest
    needs:
      - phase1-frontend
      - phase2-api
      - phase3-shared-types
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore API
        run: dotnet restore apps/api/api.csproj

      - name: Start DICOM repository
        run: pnpm repo:up

      - name: Start API
        run: pnpm api > /tmp/webtps-api.log 2>&1 &

      - name: Start frontend
        run: pnpm --dir apps/client exec vite --host 127.0.0.1 --port 3000 > /tmp/webtps-client.log 2>&1 &

      - name: Wait for API and frontend
        run: |
          for i in $(seq 1 30); do
            api_ok=false
            fe_ok=false
            curl -sf http://127.0.0.1:4000/api/health > /dev/null 2>&1 && api_ok=true
            curl -sf http://127.0.0.1:3000/ > /dev/null 2>&1 && fe_ok=true
            if $api_ok && $fe_ok; then
              echo "API and frontend are ready"
              break
            fi
            echo "Waiting for services... ($i/30) api=$api_ok frontend=$fe_ok"
            sleep 3
          done

      - name: Verify local environment
        run: pnpm local:doctor

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: webtps-api-log
          path: /tmp/webtps-api.log

      - name: Upload frontend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: webtps-client-log
          path: /tmp/webtps-client.log

      - name: Stop local services
        if: always()
        run: pnpm local:down
