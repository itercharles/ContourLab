name: WebTPS CR Completion Sync to DHF

run-name: CR completion sync | PR #${{ github.event.pull_request.number }} | ${{ github.event.pull_request.title }}

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  complete-cr:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out WebTPS
        uses: actions/checkout@v4

      - name: Extract CR ID from PR title
        id: cr
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          CR_ID=$(echo "$PR_TITLE" | grep -oE 'CR-[0-9]+' | head -n 1 || true)
          if [ -z "$CR_ID" ]; then
            echo "No CR ID found in PR title; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "cr_id=$CR_ID" >> "$GITHUB_OUTPUT"

      - name: Check out DHF repo
        if: steps.cr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: itercharles/WebTPS-DHF
          token: ${{ secrets.PRODUCT_REPO_TOKEN }}
          path: dhf

      - name: Set up Python
        if: steps.cr.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install DHF utils dependencies
        if: steps.cr.outputs.skip != 'true'
        run: pip install click jinja2 markdown pydantic PyYAML gitpython

      - name: Transition CR to completed
        if: steps.cr.outputs.skip != 'true'
        run: |
          python scripts/automation/dhf_ops.py transition \
            --dhf-repo dhf \
            --item-id "${{ steps.cr.outputs.cr_id }}" \
            --to-state completed \
            --by "github-actions[bot]"

      - name: Commit and push DHF update
        if: steps.cr.outputs.skip != 'true'
        working-directory: dhf
        run: |
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: complete ${{ steps.cr.outputs.cr_id }} [skip ci]"
            git push
          fi
