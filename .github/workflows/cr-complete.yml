name: Complete CR In DHF

run-name: CR completion | #${{ github.event.pull_request.number }}

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  complete-cr:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'feat/CR-')
    runs-on: ${{ vars.WEBTPS_DEFAULT_RUNS_ON_JSON != '' && fromJSON(vars.WEBTPS_DEFAULT_RUNS_ON_JSON) || fromJSON('["ubuntu-latest"]') }}
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: ./.github/actions/medharness-setup

      - name: Complete CR
        run: |
          medharness cr workflow complete-from-github-pr \
            --dhf-repo . \
            --event "$GITHUB_EVENT_PATH" \
            --by "github-actions[bot]" \
            --push

  # Squash merges of a CR branch can inherit [skip ci] from intermediate
  # lifecycle / transition commits, which suppresses the push-to-main Product
  # CI/CD run. Fire it explicitly via workflow_dispatch — that event ignores
  # [skip ci].
  trigger-ci-on-main:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'feat/CR-')
    runs-on: ${{ vars.WEBTPS_DEFAULT_RUNS_ON_JSON != '' && fromJSON(vars.WEBTPS_DEFAULT_RUNS_ON_JSON) || fromJSON('["ubuntu-latest"]') }}
    permissions:
      actions: write
    steps:
      - name: Trigger Product CI/CD on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run ci-pipeline.yml --ref main
