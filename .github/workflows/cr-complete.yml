name: Complete CR In DHF

run-name: CR completion | #${{ github.event.pull_request.number }}

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  complete-cr:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out DHF repo
        uses: actions/checkout@v4
        with:
          repository: itercharles/WebTPS-DHF
          token: ${{ secrets.PRODUCT_REPO_TOKEN }}
          path: dhf

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        env:
          PRODUCT_REPO_TOKEN: ${{ secrets.PRODUCT_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${PRODUCT_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          pip install -r dhf/requirements.txt

      - name: Complete CR
        run: |
          medharness cr workflow complete-from-github-pr \
            --dhf-repo dhf \
            --event "$GITHUB_EVENT_PATH" \
            --by "github-actions[bot]" \
            --push
