name: Complete CR In DHF

run-name: CR completion | #${{ github.event.pull_request.number }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  complete-cr:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'feat/CR-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install medharness
        run: pip install medharness==0.3.1

      - name: Complete CR
        run: |
          medharness cr workflow complete-from-github-pr \
            --dhf-repo . \
            --event "$GITHUB_EVENT_PATH" \
            --by "github-actions[bot]" \
            --push

  # Squash merges of any CR-stage branch can inherit [skip ci] from intermediate
  # lifecycle / transition commits (e.g. `chore: transition CR-NNN to in_review
  # [skip ci]`), which suppresses the push-to-main Product CI/CD run. Fire it
  # explicitly via workflow_dispatch — that event ignores [skip ci]. Fires for
  # cr/, spec/, design/, and feat/ so any stage can be safely bundled.
  trigger-ci-on-main:
    if: |
      github.event.pull_request.merged == true && (
        startsWith(github.event.pull_request.head.ref, 'cr/CR-') ||
        startsWith(github.event.pull_request.head.ref, 'spec/CR-') ||
        startsWith(github.event.pull_request.head.ref, 'design/CR-') ||
        startsWith(github.event.pull_request.head.ref, 'feat/CR-')
      )
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger Product CI/CD on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run ci-pipeline.yml --ref main
