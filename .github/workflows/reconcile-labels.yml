name: Reconcile Labels

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply changes instead of dry-run'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  reconcile:
    name: Reconcile repository labels
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run label reconciliation
        env:
          APPLY: ${{ inputs.apply }}
        run: |
          node scripts/automation/reconcile-labels.mjs \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            $([ "$APPLY" = "true" ] && echo "--apply")
