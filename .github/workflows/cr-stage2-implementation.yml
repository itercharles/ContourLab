name: CR Stage 2 - Implementation

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON payload for Plan -> Implementation generation'
        required: true
        type: string
      manual_bypass:
        description: 'Allow manual debug run without repository guard payload'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types:
      - plan-approved

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: cr-stage2-${{ github.event_name }}-${{ github.event.client_payload.crId || inputs.payload || github.run_id }}
  cancel-in-progress: false

jobs:
  generate-implementation-pr:
    name: Generate Implementation PR
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve payload
        id: payload
        uses: actions/github-script@v7
        with:
          script: |
            const sourcePayload = context.eventName === 'workflow_dispatch'
              ? JSON.parse(core.getInput('payload', { required: true }))
              : context.payload.client_payload;

            if (!sourcePayload || typeof sourcePayload !== 'object') {
              core.setFailed('Missing Stage 2 payload');
              return;
            }

            const crId = String(sourcePayload.crId || '').trim().toUpperCase();
            if (!/^CR-\d+$/.test(crId)) {
              core.setFailed(`Invalid crId "${sourcePayload.crId}"`);
              return;
            }

            const crNumber = crId.split('-')[1];
            const branch = `codex/cr-${crNumber}-impl`;
            const title = String(sourcePayload.title || '').trim();
            const planPrUrl = String(sourcePayload.planPrUrl || '').trim();
            const crPrUrl = String(sourcePayload.crPrUrl || '').trim();
            const manualBypass = context.eventName === 'workflow_dispatch' &&
              core.getBooleanInput('manual_bypass');

            if (!title || !planPrUrl || !crPrUrl) {
              core.setFailed('Payload fields "title", "planPrUrl", and "crPrUrl" are required');
              return;
            }

            if (!manualBypass) {
              const prTypeLabel = String(sourcePayload.prTypeLabel || '').trim();
              const crStatusLabel = String(sourcePayload.crStatusLabel || '').trim();
              const aiControlLabel = String(sourcePayload.aiControlLabel || '').trim();
              const blocked = Boolean(sourcePayload.blocked);
              const hasHumanApproval = Boolean(sourcePayload.hasHumanApproval);
              const approvalActor = String(sourcePayload.approvalActor || '').trim();
              const authorizedApprovers = Array.isArray(sourcePayload.authorizedApprovers)
                ? sourcePayload.authorizedApprovers.map((value) => String(value).trim()).filter(Boolean)
                : [];

              if (prTypeLabel !== 'pr:plan') {
                core.setFailed(`Stage 2 guard failed: expected prTypeLabel "pr:plan", got "${prTypeLabel}"`);
                return;
              }

              if (crStatusLabel !== 'cr:analyze') {
                core.setFailed(`Stage 2 guard failed: expected crStatusLabel "cr:analyze", got "${crStatusLabel}"`);
                return;
              }

              if (aiControlLabel !== 'ai:ready') {
                core.setFailed(`Stage 2 guard failed: expected aiControlLabel "ai:ready", got "${aiControlLabel}"`);
                return;
              }

              if (blocked) {
                core.setFailed('Stage 2 guard failed: payload is blocked');
                return;
              }

              if (!hasHumanApproval || !approvalActor) {
                core.setFailed('Stage 2 guard failed: approved human reviewer is required');
                return;
              }

              if (!authorizedApprovers.length || !authorizedApprovers.includes(approvalActor)) {
                core.setFailed(`Stage 2 guard failed: approvalActor "${approvalActor}" is not authorized`);
                return;
              }
            }

            core.setOutput('json', JSON.stringify(sourcePayload));
            core.setOutput('cr_id', crId);
            core.setOutput('cr_number', crNumber);
            core.setOutput('branch', branch);
            core.setOutput('title', title);
            core.setOutput('implementation_doc', `docs/${crId.replace('-', '')}-Implementation.md`);
            core.setOutput('manual_bypass', String(manualBypass));

      - name: Verify Plan PR state via GitHub API
        if: >
          steps.payload.outputs.manual_bypass != 'true' &&
          fromJson(steps.payload.outputs.json).planPullNumber
        uses: actions/github-script@v7
        env:
          PAYLOAD_JSON: ${{ steps.payload.outputs.json }}
        with:
          script: |
            const payload = JSON.parse(process.env.PAYLOAD_JSON);
            const pull_number = Number(payload.planPullNumber);
            const authorizedApprovers = Array.isArray(payload.authorizedApprovers)
              ? payload.authorizedApprovers.map((value) => String(value).trim()).filter(Boolean)
              : [];

            const [{ data: issueLabels }, { data: reviews }, { data: pull }] = await Promise.all([
              github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull_number,
              }),
              github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
                per_page: 100,
              }),
              github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
              }),
            ]);

            const labelNames = new Set(issueLabels.map((label) => label.name));
            const latestReviewByUser = new Map();

            for (const review of reviews) {
              const login = review.user?.login;
              if (!login) continue;
              latestReviewByUser.set(login, review.state);
            }

            const activeApprovedUsers = Array.from(latestReviewByUser.entries())
              .filter(([, state]) => state === 'APPROVED')
              .map(([login]) => login);

            if (pull.state !== 'open') {
              core.setFailed(`Stage 2 API verification failed: Plan PR #${pull_number} is not open`);
              return;
            }

            for (const label of ['pr:plan', 'cr:analyze', 'ai:ready']) {
              if (!labelNames.has(label)) {
                core.setFailed(`Stage 2 API verification failed: Plan PR #${pull_number} is missing label "${label}"`);
                return;
              }
            }

            if (labelNames.has('ai:blocked')) {
              core.setFailed(`Stage 2 API verification failed: Plan PR #${pull_number} is labeled "ai:blocked"`);
              return;
            }

            if (!authorizedApprovers.length) {
              core.setFailed('Stage 2 API verification failed: authorizedApprovers is required');
              return;
            }

            if (!activeApprovedUsers.some((login) => authorizedApprovers.includes(login))) {
              core.setFailed(
                `Stage 2 API verification failed: Plan PR #${pull_number} has no active APPROVED review from an authorized reviewer`
              );
              return;
            }

      - name: Generate implementation kickoff doc
        run: node scripts/automation/stage2-implementation-pr.mjs --payload '${{ steps.payload.outputs.json }}'

      - name: Create or update Implementation PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: docs(${{ steps.payload.outputs.cr_id }}): start implementation branch
          branch: ${{ steps.payload.outputs.branch }}
          base: main
          delete-branch: false
          draft: true
          title: 'impl(${{ steps.payload.outputs.cr_id }}): ${{ steps.payload.outputs.title }}'
          body: |
            ## Summary

            Stage 2 automation created or updated the implementation kickoff surface for `${{ steps.payload.outputs.cr_id }}`.

            ## Links

            - CR PR: ${{ fromJson(steps.payload.outputs.json).crPrUrl }}
            - Plan Spec PR: ${{ fromJson(steps.payload.outputs.json).planPrUrl }}
            - Implementation kickoff doc: `${{ steps.payload.outputs.implementation_doc }}`

            ## Notes

            - This PR starts as a draft implementation PR
            - Human review is still required before merge
            - Update the PR body with automated validation and manual testing as implementation proceeds
          labels: |
            pr:implementation
            cr:developing
            ai:ready
          add-paths: |
            ${{ steps.payload.outputs.implementation_doc }}

      - name: Sync CR status back to WebTPS-DHF
        if: >
          steps.cpr.outputs.pull-request-number &&
          secrets.WEBTPS_AUTOMATION_TOKEN != '' &&
          fromJson(steps.payload.outputs.json).dhfRepoOwner &&
          fromJson(steps.payload.outputs.json).dhfRepoName &&
          fromJson(steps.payload.outputs.json).crPullNumber
        uses: actions/github-script@v7
        env:
          PAYLOAD_JSON: ${{ steps.payload.outputs.json }}
        with:
          github-token: ${{ secrets.WEBTPS_AUTOMATION_TOKEN }}
          script: |
            const payload = JSON.parse(process.env.PAYLOAD_JSON);
            const owner = String(payload.dhfRepoOwner);
            const repo = String(payload.dhfRepoName);
            const issue_number = Number(payload.crPullNumber);

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });

            for (const name of labels.map((label) => label.name).filter((name) => name === 'cr:analyze')) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['cr:developing'],
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                `Stage 2 automation created or updated Implementation PR #${{ steps.cpr.outputs.pull-request-number }}.`,
                `Implementation PR URL: ${{ steps.cpr.outputs.pull-request-url }}`,
                'CR status should now be treated as `developing`.',
              ].join('\n'),
            });

      - name: Summarize Stage 2 result
        run: |
          echo "Generated or updated implementation kickoff from plan payload." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Payload source: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Manual bypass: ${{ steps.payload.outputs.manual_bypass }}" >> "$GITHUB_STEP_SUMMARY"
          echo "CR: ${{ steps.payload.outputs.cr_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Implementation kickoff doc: \`${{ steps.payload.outputs.implementation_doc }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: \`${{ steps.payload.outputs.branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Implementation PR: ${{ steps.cpr.outputs.pull-request-url || 'No PR created (no diff)' }}" >> "$GITHUB_STEP_SUMMARY"
