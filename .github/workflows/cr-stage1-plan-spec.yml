name: CR Stage 1 - Plan Spec

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON payload for CR -> Plan Spec generation'
        required: true
        type: string
      manual_bypass:
        description: 'Allow manual debug run without repository guard payload'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types:
      - cr-approved

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: cr-stage1-${{ github.event_name }}-${{ github.event.client_payload.crId || inputs.payload || github.run_id }}
  cancel-in-progress: false

jobs:
  generate-plan-spec:
    name: Generate Plan Spec PR
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'repository_dispatch' &&
       github.event.action == 'cr-approved')
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve payload
        id: payload
        uses: actions/github-script@v7
        with:
          script: |
            const sourcePayload = context.eventName === 'workflow_dispatch'
              ? JSON.parse(core.getInput('payload', { required: true }))
              : context.payload.client_payload;

            if (!sourcePayload || typeof sourcePayload !== 'object') {
              core.setFailed('Missing CR payload');
              return;
            }

            const crId = String(sourcePayload.crId || '').trim().toUpperCase();
            if (!/^CR-\d+$/.test(crId)) {
              core.setFailed(`Invalid crId "${sourcePayload.crId}"`);
              return;
            }

            const crNumber = crId.split('-')[1];
            const specPath = `docs/${crId.replace('-', '')}-Spec.md`;
            const branch = `codex/cr-${crNumber}-plan`;
            const title = String(sourcePayload.title || '').trim();
            const crPrUrl = String(sourcePayload.crPrUrl || '').trim();
            const manualBypass = context.eventName === 'workflow_dispatch' &&
              core.getBooleanInput('manual_bypass');

            if (!title) {
              core.setFailed('Payload field "title" is required');
              return;
            }

            if (!crPrUrl) {
              core.setFailed('Payload field "crPrUrl" is required');
              return;
            }

            if (!manualBypass) {
              const prTypeLabel = String(sourcePayload.prTypeLabel || '').trim();
              const crStatusLabel = String(sourcePayload.crStatusLabel || '').trim();
              const aiControlLabel = String(sourcePayload.aiControlLabel || '').trim();
              const blocked = Boolean(sourcePayload.blocked);
              const hasHumanApproval = Boolean(sourcePayload.hasHumanApproval);
              const approvalActor = String(sourcePayload.approvalActor || '').trim();
              const authorizedApprovers = Array.isArray(sourcePayload.authorizedApprovers)
                ? sourcePayload.authorizedApprovers.map((value) => String(value).trim()).filter(Boolean)
                : [];

              if (prTypeLabel !== 'pr:cr') {
                core.setFailed(`Stage 1 guard failed: expected prTypeLabel "pr:cr", got "${prTypeLabel}"`);
                return;
              }

              if (crStatusLabel !== 'cr:new') {
                core.setFailed(`Stage 1 guard failed: expected crStatusLabel "cr:new", got "${crStatusLabel}"`);
                return;
              }

              if (aiControlLabel !== 'ai:ready') {
                core.setFailed(`Stage 1 guard failed: expected aiControlLabel "ai:ready", got "${aiControlLabel}"`);
                return;
              }

              if (blocked) {
                core.setFailed('Stage 1 guard failed: payload is blocked');
                return;
              }

              if (!hasHumanApproval) {
                core.setFailed('Stage 1 guard failed: human approval is required');
                return;
              }

              if (!approvalActor) {
                core.setFailed('Stage 1 guard failed: approvalActor is required');
                return;
              }

              if (!authorizedApprovers.length) {
                core.setFailed('Stage 1 guard failed: authorizedApprovers is required');
                return;
              }

              if (!authorizedApprovers.includes(approvalActor)) {
                core.setFailed(`Stage 1 guard failed: approvalActor "${approvalActor}" is not authorized`);
                return;
              }
            }

            core.setOutput('json', JSON.stringify(sourcePayload));
            core.setOutput('cr_id', crId);
            core.setOutput('cr_number', crNumber);
            core.setOutput('title', title);
            core.setOutput('spec_path', specPath);
            core.setOutput('branch', branch);
            core.setOutput('manual_bypass', String(manualBypass));

      - name: Generate plan spec
        run: node scripts/automation/stage1-plan-spec.mjs --payload '${{ steps.payload.outputs.json }}'

      - name: Verify CR PR state via GitHub API
        if: >
          steps.payload.outputs.manual_bypass != 'true' &&
          secrets.WEBTPS_AUTOMATION_TOKEN != '' &&
          fromJson(steps.payload.outputs.json).dhfRepoOwner &&
          fromJson(steps.payload.outputs.json).dhfRepoName &&
          fromJson(steps.payload.outputs.json).crPullNumber
        uses: actions/github-script@v7
        env:
          PAYLOAD_JSON: ${{ steps.payload.outputs.json }}
        with:
          github-token: ${{ secrets.WEBTPS_AUTOMATION_TOKEN }}
          script: |
            const payload = JSON.parse(process.env.PAYLOAD_JSON);
            const owner = String(payload.dhfRepoOwner);
            const repo = String(payload.dhfRepoName);
            const pull_number = Number(payload.crPullNumber);

            const [{ data: issueLabels }, { data: reviews }, { data: pull }] = await Promise.all([
              github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: pull_number }),
              github.rest.pulls.listReviews({ owner, repo, pull_number, per_page: 100 }),
              github.rest.pulls.get({ owner, repo, pull_number }),
            ]);

            const labelNames = new Set(issueLabels.map((label) => label.name));
            const authorizedApprovers = Array.isArray(payload.authorizedApprovers)
              ? payload.authorizedApprovers.map((value) => String(value).trim()).filter(Boolean)
              : [];
            const latestReviewByUser = new Map();

            for (const review of reviews) {
              const login = review.user?.login;
              if (!login) continue;
              latestReviewByUser.set(login, review.state);
            }

            const activeApprovedUsers = Array.from(latestReviewByUser.entries())
              .filter(([, state]) => state === 'APPROVED')
              .map(([login]) => login);
            const hasApprovedReview = activeApprovedUsers.length > 0;
            const hasAuthorizedApproval = authorizedApprovers.length > 0 &&
              activeApprovedUsers.some((login) => authorizedApprovers.includes(login));

            if (pull.state !== 'open') {
              core.setFailed(`Stage 1 API verification failed: DHF PR #${pull_number} is not open`);
              return;
            }

            if (!labelNames.has('pr:cr')) {
              core.setFailed(`Stage 1 API verification failed: DHF PR #${pull_number} is missing label "pr:cr"`);
              return;
            }

            if (!labelNames.has('cr:new')) {
              core.setFailed(`Stage 1 API verification failed: DHF PR #${pull_number} is missing label "cr:new"`);
              return;
            }

            if (!labelNames.has('ai:ready')) {
              core.setFailed(`Stage 1 API verification failed: DHF PR #${pull_number} is missing label "ai:ready"`);
              return;
            }

            if (labelNames.has('ai:blocked')) {
              core.setFailed(`Stage 1 API verification failed: DHF PR #${pull_number} is labeled "ai:blocked"`);
              return;
            }

            if (!hasApprovedReview) {
              core.setFailed(`Stage 1 API verification failed: DHF PR #${pull_number} has no active APPROVED review`);
              return;
            }

            if (!authorizedApprovers.length) {
              core.setFailed('Stage 1 API verification failed: authorizedApprovers is required for live verification');
              return;
            }

            if (!hasAuthorizedApproval) {
              core.setFailed(
                `Stage 1 API verification failed: DHF PR #${pull_number} has no active APPROVED review from an authorized reviewer`
              );
              return;
            }

      - name: Create or update Plan Spec PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: docs(${{ steps.payload.outputs.cr_id }}): update plan spec
          branch: ${{ steps.payload.outputs.branch }}
          base: main
          delete-branch: false
          title: 'plan(${{ steps.payload.outputs.cr_id }}): ${{ steps.payload.outputs.title }}'
          body: |
            ## Summary

            Stage 1 automation generated or updated the Plan Spec scaffold for `${{ steps.payload.outputs.cr_id }}`.

            ## Links

            - CR PR: ${{ fromJson(steps.payload.outputs.json).crPrUrl }}
            - Plan Spec file: `${{ steps.payload.outputs.spec_path }}`

            ## Notes

            - This PR is the plan review surface for `${{ steps.payload.outputs.cr_id }}`
            - Human approval is required before implementation may begin
            - Follow `docs/process/plan_spec_template.md` for required content
          labels: |
            pr:plan
            cr:analyze
            ai:ready
          add-paths: |
            ${{ steps.payload.outputs.spec_path }}

      - name: Sync CR status back to WebTPS-DHF
        if: >
          steps.cpr.outputs.pull-request-number &&
          secrets.WEBTPS_AUTOMATION_TOKEN != '' &&
          fromJson(steps.payload.outputs.json).dhfRepoOwner &&
          fromJson(steps.payload.outputs.json).dhfRepoName &&
          fromJson(steps.payload.outputs.json).crPullNumber
        uses: actions/github-script@v7
        env:
          PAYLOAD_JSON: ${{ steps.payload.outputs.json }}
        with:
          github-token: ${{ secrets.WEBTPS_AUTOMATION_TOKEN }}
          script: |
            const payload = JSON.parse(process.env.PAYLOAD_JSON);
            const owner = String(payload.dhfRepoOwner);
            const repo = String(payload.dhfRepoName);
            const issue_number = Number(payload.crPullNumber);

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner,
              repo,
              issue_number,
            });

            const remove = labels
              .map((label) => label.name)
              .filter((name) => name === 'cr:new');

            for (const name of remove) {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number,
                name,
              });
            }

            for (const name of ['cr:analyze']) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [name],
              });
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                `Stage 1 automation created or updated Plan Spec PR #${{ steps.cpr.outputs.pull-request-number }}.`,
                `Plan Spec URL: ${{ steps.cpr.outputs.pull-request-url }}`,
                'CR status should now be treated as `analyze`.',
              ].join('\n'),
            });

      - name: Summarize scaffold result
        run: |
          echo "Generated or updated Plan Spec scaffold from CR payload." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Payload source: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Manual bypass: ${{ steps.payload.outputs.manual_bypass }}" >> "$GITHUB_STEP_SUMMARY"
          echo "CR: ${{ steps.payload.outputs.cr_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Plan Spec file: \`${{ steps.payload.outputs.spec_path }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: \`${{ steps.payload.outputs.branch }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Plan Spec PR: ${{ steps.cpr.outputs.pull-request-url || 'No PR created (no diff)' }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload generated spec on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cr-stage1-worktree
          path: docs/CR*-Spec.md
