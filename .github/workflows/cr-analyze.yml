name: WebTPS CR Analysis Automation

run-name: CR analysis | ${{ github.event.pull_request.head.ref || inputs.cr_id || github.ref_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    types: [closed]
    branches: [main]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      cr_id:
        description: 'CR ID (e.g. CR-030)'
        required: true
        type: string

jobs:
  analyze:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'cr/CR-')) ||
      (github.event_name == 'pull_request' && !github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'spec/CR-')) ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested' && startsWith(github.event.pull_request.head.ref, 'spec/CR-'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install medharness
        run: pip install medharness

      - name: Determine mode and CR ID
        id: ctx
        env:
          MANUAL_CR_ID: ${{ inputs.cr_id }}
        run: |
          python -m medharness ci github-event \
            --github-output "$GITHUB_OUTPUT" \
            --manual-cr "${MANUAL_CR_ID:-}"

      - name: Cancel CR
        if: steps.ctx.outputs.mode == 'cancel'
        run: |
          git checkout main
          python -m medharness --dhf DHF dhf item transition \
            "${{ steps.ctx.outputs.cr_id }}" cancelled \
            --by "github-actions[bot]" --commit --push

      - uses: actions/setup-node@v4
        if: steps.ctx.outputs.mode != 'cancel'
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.ctx.outputs.mode != 'cancel'
        run: npm install -g @anthropic-ai/claude-code

      - name: Transition CR to in_review
        if: steps.ctx.outputs.mode == 'new'
        run: |
          python -m medharness --dhf DHF dhf item transition "${{ steps.ctx.outputs.cr_id }}" in_review --by "github-actions[bot]"

      - name: Fetch product test evidence
        if: steps.ctx.outputs.mode != 'cancel'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          mkdir -p /tmp/test-artifacts
          RUN_ID=$(gh run list --workflow ci-pipeline.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --name product-test-results --dir /tmp/test-artifacts 2>/dev/null || echo "No product-test-results artifact yet"
          else
            echo "No successful CI runs found — skipping test evidence"
          fi

      - name: Pre-compute DHF context
        if: steps.ctx.outputs.mode != 'cancel'
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          DHF_CONTEXT=$(python -m medharness --dhf DHF dhf context for-stage analyze --cr "$CR_ID" 2>/dev/null || echo '{}')
          echo "DHF_CONTEXT=$DHF_CONTEXT" >> "$GITHUB_ENV"

      - name: Read session ID for iteration
        if: steps.ctx.outputs.mode == 'iterate'
        id: session
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          SESSION_ID=$(python -m medharness ci claude-session get "$PR_NUMBER" 2>/dev/null || echo "")
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"

      - name: Collect review feedback
        if: steps.ctx.outputs.mode == 'iterate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" > /tmp/review-comments.json
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" > /tmp/reviews.json

      - name: Generate spec
        if: steps.ctx.outputs.mode == 'new'
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_ANALYZE_MODEL }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
          DHF_CONTEXT: ${{ env.DHF_CONTEXT }}
        run: |
          mkdir -p docs/cr-specs
          [ -n "$ANTHROPIC_MODEL" ] || unset ANTHROPIC_MODEL
          PROMPT=$(sed "s/{{cr_id}}/$CR_ID/g" .github/prompts/cr-analyze.md)
          echo "=== PROMPT ===" && echo "$PROMPT" && echo "=== CLAUDE OUTPUT ==="
          SESSION_ID=$(uuidgen)
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          claude -p --dangerously-skip-permissions --session-id "$SESSION_ID" "$PROMPT" 2>&1 | tee /tmp/claude-out.txt || true

      - name: Revise spec
        if: steps.ctx.outputs.mode == 'iterate'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_ANALYZE_MODEL }}
          SESSION_ID: ${{ steps.session.outputs.session_id }}
        run: |
          [ -n "$ANTHROPIC_MODEL" ] || unset ANTHROPIC_MODEL
          if [ -n "$SESSION_ID" ]; then
            claude --resume "$SESSION_ID" -p --dangerously-skip-permissions \
              "Revise the CR spec based on the review feedback in /tmp/review-comments.json and /tmp/reviews.json. Update docs/cr-specs/ only if changes are warranted."
          else
            claude -p --dangerously-skip-permissions \
              "Revise the CR spec on this branch based on the review feedback in /tmp/review-comments.json and /tmp/reviews.json. Update docs/cr-specs/ only if changes are warranted."
          fi

      - name: Commit spec branch
        if: steps.ctx.outputs.mode == 'new'
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          git checkout -B "spec/$CR_ID"
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "DHF/items/09_cr/$CR_ID.yaml"
          [ -f "docs/cr-specs/$CR_ID-Spec.md" ] && git add "docs/cr-specs/$CR_ID-Spec.md" || true
          if ! git diff --staged --quiet; then
            git commit -m "feat: analyze $CR_ID"
          fi
          git push --force --set-upstream origin "spec/$CR_ID"

      - name: Commit revised spec
        if: steps.ctx.outputs.mode == 'iterate'
        run: |
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cr-specs/
          if ! git diff --staged --quiet; then
            git commit -m "docs: revise spec from review feedback"
            git push
          fi

      - name: Open spec PR and store session ID
        if: steps.ctx.outputs.mode == 'new'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
          SESSION_ID: ${{ steps.gen.outputs.session_id }}
        run: |
          EXISTING=$(gh pr list --head "spec/$CR_ID" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            PR_URL=$(gh pr create \
              --head "spec/$CR_ID" \
              --base main \
              --title "spec($CR_ID): AI analysis plan" \
              --body "Automated spec generated for $CR_ID.")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          else
            PR_NUMBER=$EXISTING
          fi
          if [ -n "$SESSION_ID" ]; then
            python -m medharness ci claude-session put "$PR_NUMBER" "$SESSION_ID"
          fi
