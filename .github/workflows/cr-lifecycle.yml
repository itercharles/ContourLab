name: WebTPS CR Lifecycle

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
    && format('{0} | re-run stage:{1}', inputs.cr_id, inputs.stage)
    || format('CR lifecycle | {0} | {1}',
        github.event.pull_request.head.ref,
        github.event.review.state || (github.event.pull_request.merged == true && 'merged' || 'closed')) }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      cr_id:
        description: 'CR ID (e.g. CR-034)'
        required: true
        type: string
      stage:
        description: 'Stage to re-run'
        required: true
        type: choice
        options: [cr, spec, design, code]

concurrency:
  group: cr-lifecycle-${{ github.event.pull_request.number || inputs.cr_id }}
  cancel-in-progress: true

# ── DETECT ────────────────────────────────────────────────────────────────────
# Determines what action to take and passes context to downstream jobs.
# action values: gen-spec | gen-design | gen-code | code-approved |
#                revise-spec | revise-design | revise-code |
#                cr-no-revise | cancel | noop

jobs:
  detect:
    if: |
      startsWith(github.event.pull_request.head.ref, 'feat/CR-') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      action: ${{ steps.plan.outputs.action }}
      cr_id: ${{ steps.plan.outputs.cr_id }}
      pr_number: ${{ steps.enrich.outputs.pr_number }}
      branch: ${{ steps.enrich.outputs.branch }}
      issue_number: ${{ steps.enrich.outputs.issue_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/medharness-setup

      - name: Plan lifecycle action
        id: plan
        run: |
          python -m medharness ci github-event \
            --stage-label-prefix "cr:stage/" \
            --dispatch-action cr=gen-spec \
            --dispatch-action spec=gen-design \
            --dispatch-action design=gen-code \
            --dispatch-action code=code-approved \
            --review-action "approved:cr=gen-spec" \
            --review-action "approved:spec=gen-design" \
            --review-action "approved:design=gen-code" \
            --review-action "approved:code=code-approved" \
            --review-action "changes_requested:cr=cr-no-revise" \
            --review-action "changes_requested:spec=revise-spec" \
            --review-action "changes_requested:design=revise-design" \
            --review-action "changes_requested:code=revise-code" \
            --pr-action "merged=noop" \
            --pr-action "closed=cancel" \
            --default-action noop \
            --github-output "$GITHUB_OUTPUT" \
            | tee /tmp/event-plan.json

      - name: Enrich with PR number, branch, and linked issue
        id: enrich
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CR_ID=$(jq -r '.cr_id // ""' /tmp/event-plan.json)
          PR_NUMBER=$(jq -r '.pr_number // ""' /tmp/event-plan.json)
          [ -z "$PR_NUMBER" ] && PR_NUMBER="${{ github.event.pull_request.number }}"
          BRANCH=$(jq -r '.branch_ref // ""' /tmp/event-plan.json)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="feat/$CR_ID"
            PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" \
              --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$PR_NUMBER" ]; then
              echo "ERROR: no open PR found for $BRANCH" >&2
              exit 1
            fi
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          ISSUE_NUMBER=""
          if [ -n "$PR_NUMBER" ]; then
            ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
              --json closingIssuesReferences \
              --jq '.closingIssuesReferences[0].number // empty' 2>/dev/null || echo "")
          fi
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

  # ── CANCEL ────────────────────────────────────────────────────────────────

  cancel-cr:
    needs: [detect]
    if: needs.detect.outputs.action == 'cancel'
    name: "Cancel CR (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: ./.github/actions/medharness-setup

      - name: Cancel CR
        run: |
          CR_ID="${{ needs.detect.outputs.cr_id }}"
          BRANCH="${{ needs.detect.outputs.branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH" --depth 1
          git checkout "origin/$BRANCH" -- "DHF/items/09_cr/$CR_ID.yaml"
          python -m medharness --dhf DHF dhf item transition \
            "$CR_ID" cancelled \
            --by "github-actions[bot]" --commit --push

  # ── CR STAGE: no AI revision ───────────────────────────────────────────────

  cr-no-revise:
    needs: [detect]
    if: needs.detect.outputs.action == 'cr-no-revise'
    name: "CR Stage: No AI Revision"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ needs.detect.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --body "The CR YAML (\`DHF/items/09_cr/${{ needs.detect.outputs.cr_id }}.yaml\`) is human-authored — there is no AI revision path at this stage. Please update it manually and re-approve."

  # ── SPEC: GENERATE ────────────────────────────────────────────────────────

  gen-spec:
    needs: [detect]
    if: needs.detect.outputs.action == 'gen-spec'
    name: "Generate Spec (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_PAT }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: ./.github/actions/cr-agent-setup
      - name: Fetch test evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          mkdir -p /tmp/test-artifacts
          RUN_ID=$(gh run list --workflow ci-pipeline.yml --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          [ -n "$RUN_ID" ] && gh run download "$RUN_ID" --name product-test-results \
            --dir /tmp/test-artifacts 2>/dev/null || true
      - name: Generate spec
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_ANALYZE_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          python -m medharness --dhf DHF ci analyze-cr --cr "$CR_ID" | tee /tmp/analyze-out.json

      - name: Gate on spec validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          STATUS=$(jq -r '.status // "unknown"' /tmp/analyze-out.json)
          if [ "$STATUS" = "completed_with_errors" ]; then
            ERRORS=$(jq -r '.errors[] | "- **\(.field)**: \(.issue)\n  _Fix:_ \(.fix)"' /tmp/analyze-out.json)
            BODY=$(printf '⚠️ **Spec validation has residual errors** for %s:\n\n%s\n\nFix the spec front-matter and submit `changes_requested` to trigger a revision.' "$CR_ID" "$ERRORS")
            gh pr comment "$PR_NUMBER" --body "$BODY"
            exit 1
          fi

      - name: Gate on triage disposition
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          DISPOSITION=$(jq -r '.analysis.disposition // "approve"' /tmp/analyze-out.json)
          if echo "$DISPOSITION" | grep -qE '^(decline:|hold:)'; then
            RATIONALE=$(jq -r '.analysis.decline_rationale // "No rationale provided."' /tmp/analyze-out.json)
            BODY=$(printf '**%s triaged as `%s`**\n\n%s\n\nThe CR has been declined or placed on hold at the triage stage. No spec will be written. Close this PR or update the CR YAML and re-approve to reconsider.' "$CR_ID" "$DISPOSITION" "$RATIONALE")
            gh pr comment "$PR_NUMBER" --body "$BODY"
            exit 1
          fi

      - name: Commit and advance to spec review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cr-specs/ DHF/items/
          COMMITTED=false
          if ! git diff --staged --quiet; then
            VALIDATION=$(jq -r '.validation // "unknown"' /tmp/analyze-out.json)
            CORRECTIONS=$(jq -r '.corrections // 0' /tmp/analyze-out.json)
            DISPOSITION=$(jq -r '.analysis.disposition // "approve"' /tmp/analyze-out.json)
            ROUTE=$(jq -r '.analysis.pipeline_route // "standard"' /tmp/analyze-out.json)
            git commit \
              -m "docs: spec for $CR_ID" \
              -m "Disposition: $DISPOSITION | Route: $ROUTE | Validation: $VALIDATION ($CORRECTIONS correction(s))"
            git push
            COMMITTED=true
          fi
          SPEC_EXISTS=$(git diff origin/main -- "docs/cr-specs/${CR_ID}-Spec.md" | grep -c "^+" || echo "0")
          if [ "$COMMITTED" = "true" ] || [ "$SPEC_EXISTS" -gt "0" ]; then
            gh pr edit "$PR_NUMBER" --remove-label "cr:stage/cr" --add-label "cr:stage/spec"
            ISSUE_NUMBER="${{ needs.detect.outputs.issue_number }}"
            [ -n "$ISSUE_NUMBER" ] && gh issue edit "$ISSUE_NUMBER" --remove-label "cr:stage/cr" --add-label "cr:stage/spec" 2>/dev/null || true
          else
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ Spec generation produced no output for $CR_ID — stage not advanced. Re-trigger via Actions → workflow_dispatch (stage: cr) and check Claude logs."
            exit 1
          fi

      - name: Post spec analysis summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          ROUTE=$(jq -r '.analysis.pipeline_route // "standard"' /tmp/analyze-out.json)
          IMPACT=$(jq -r '.analysis.design_impact_summary // ""' /tmp/analyze-out.json)
          PROPOSED=$(jq -r '[.analysis.proposed_new_items[]? | "- " + .type + ": " + .title] | join("\n")' /tmp/analyze-out.json)
          NEEDS_TC=$(jq -r '[.analysis.test_plan.needs_new_tc[]?] | join(", ")' /tmp/analyze-out.json)

          BODY="**Spec analysis for $CR_ID** | route: \`$ROUTE\`"$'\n'
          [ -n "$IMPACT" ] && BODY="${BODY}"$'\n'"$IMPACT"$'\n'
          if [ -n "$PROPOSED" ]; then
            BODY="${BODY}"$'\n'"**Proposed new DHF items:**"$'\n'"$PROPOSED"$'\n'
          fi
          if [ -n "$NEEDS_TC" ]; then
            BODY="${BODY}"$'\n'"**Test cases required for:** $NEEDS_TC"$'\n'
          fi
          gh pr comment "$PR_NUMBER" --body "$BODY"

  # ── SPEC: REVISE ──────────────────────────────────────────────────────────

  revise-spec:
    needs: [detect]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'revise-spec'
    name: "Revise Spec (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_PAT }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: ./.github/actions/cr-agent-setup
      - name: Revise spec
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_ANALYZE_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          python -m medharness --dhf DHF ci analyze-cr --cr "$CR_ID" --pr "$PR_NUMBER" | tee /tmp/revise-spec-out.json

      - name: Gate on spec validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          STATUS=$(jq -r '.status // "unknown"' /tmp/revise-spec-out.json)
          if [ "$STATUS" = "completed_with_errors" ]; then
            ERRORS=$(jq -r '.errors[] | "- **\(.field)**: \(.issue)\n  _Fix:_ \(.fix)"' /tmp/revise-spec-out.json)
            BODY=$(printf '⚠️ **Spec revision still has residual errors** for %s:\n\n%s' "$CR_ID" "$ERRORS")
            gh pr comment "$PR_NUMBER" --body "$BODY"
            exit 1
          fi

      - name: Commit revision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cr-specs/ DHF/items/
          if ! git diff --staged --quiet; then
            VALIDATION=$(jq -r '.validation // "unknown"' /tmp/revise-spec-out.json)
            CORRECTIONS=$(jq -r '.corrections // 0' /tmp/revise-spec-out.json)
            git commit \
              -m "docs: revise spec for $CR_ID" \
              -m "Validation: $VALIDATION ($CORRECTIONS correction(s))"
            git push
          fi

  # ── DESIGN: GENERATE ──────────────────────────────────────────────────────

  gen-design:
    needs: [detect]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'gen-design'
    name: "Generate Design (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_PAT }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: ./.github/actions/cr-agent-setup
      - name: Validate spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          if ! python -m medharness ci validate-spec \
            --cr "$CR_ID" \
            --spec "docs/cr-specs/${CR_ID}-Spec.md" \
            --dhf DHF; then
            gh pr comment "$PR_NUMBER" --body \
              "**Spec validation failed** for $CR_ID. Submit \`changes_requested\` to trigger a revision, then re-approve once the spec is updated."
            exit 1
          fi
      - name: Check pipeline route
        id: design_check
        env:
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          ROUTE=$(jq -r '.pipeline_route // "standard"' "docs/cr-specs/${CR_ID}-Spec.json" 2>/dev/null || echo "standard")
          echo "route=$ROUTE" >> "$GITHUB_OUTPUT"
          if [ "$ROUTE" = "doc-only" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Preflight design validation
        if: steps.design_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          if ! python -m medharness ci validate-design \
            --cr "$CR_ID" \
            --dhf DHF \
            --spec "docs/cr-specs/${CR_ID}-Spec.md"; then
            gh pr comment "$PR_NUMBER" --body \
              "⚠️ **Design preflight failed** for $CR_ID — spec references items that don't exist or the DHF has traceability gaps. Correct the affected items and re-approve."
            exit 1
          fi

      - name: Generate design
        if: steps.design_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DESIGN_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          python -m medharness --dhf DHF ci design-cr --cr "$CR_ID" | tee /tmp/design-out.json

      - name: Gate on design validation
        if: steps.design_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          STATUS=$(jq -r '.status // "unknown"' /tmp/design-out.json)
          if [ "$STATUS" = "completed_with_errors" ]; then
            ERRORS=$(jq -r '.errors[] | "- **\(.field)**: \(.issue)\n  _Fix:_ \(.fix)"' /tmp/design-out.json)
            BODY=$(printf '⚠️ **Design validation has residual errors** for %s:\n\n%s\n\nReview the DHF items and submit `changes_requested` to trigger a design revision.' "$CR_ID" "$ERRORS")
            gh pr comment "$PR_NUMBER" --body "$BODY"
            exit 1
          fi

      - name: Commit design
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          SKIP_DESIGN: ${{ steps.design_check.outputs.skip }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DHF/ docs/cr-specs/
          if ! git diff --staged --quiet; then
            COMMIT_BODY=""
            if [ -f /tmp/design-out.json ]; then
              VALIDATION=$(jq -r '.validation // "unknown"' /tmp/design-out.json)
              CORRECTIONS=$(jq -r '.corrections // 0' /tmp/design-out.json)
              CREATED=$(jq -r '.items_changed.created | join(", ")' /tmp/design-out.json)
              UPDATED=$(jq -r '.items_changed.updated | join(", ")' /tmp/design-out.json)
              DELETED=$(jq -r '.items_changed.deleted | join(", ")' /tmp/design-out.json)
              [ -n "$CREATED" ] && COMMIT_BODY="${COMMIT_BODY}Created: ${CREATED}"$'\n'
              [ -n "$UPDATED" ] && COMMIT_BODY="${COMMIT_BODY}Updated: ${UPDATED}"$'\n'
              [ -n "$DELETED" ] && COMMIT_BODY="${COMMIT_BODY}Deleted: ${DELETED}"$'\n'
              COMMIT_BODY="${COMMIT_BODY}Validation: ${VALIDATION} (${CORRECTIONS} correction(s))"
            fi
            if [ -n "$COMMIT_BODY" ]; then
              git commit -m "feat: design $CR_ID" -m "$COMMIT_BODY"
            else
              git commit -m "feat: design $CR_ID"
            fi
            git push
          fi
      - name: Validate DHF traceability
        if: steps.design_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          if ! python -m medharness ci dhf-validate \
            --dhf DHF \
            --run-schema \
            --run-traceability \
            --coverage-pair UC:CRS \
            --coverage-pair CRS:SYS \
            --coverage-pair SYS:SRS \
            --coverage-pair SRS:SWDD \
            --coverage-pair SYS:SYSARCH \
            --coverage-pair RISK:RCM; then
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ DHF traceability check failed after design generation for $CR_ID. Correct the DHF items and re-approve to retry."
            exit 1
          fi
      - name: Advance to design review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
          SKIP_DESIGN: ${{ steps.design_check.outputs.skip }}
          ROUTE: ${{ steps.design_check.outputs.route }}
        run: |
          if [ "$SKIP_DESIGN" = "true" ]; then
            gh pr comment "$PR_NUMBER" \
              --body "$CR_ID pipeline route is \`$ROUTE\` — design stage skipped. Approve to proceed to implementation."
          fi
          gh pr edit "$PR_NUMBER" --remove-label "cr:stage/spec" --add-label "cr:stage/design"
          ISSUE_NUMBER="${{ needs.detect.outputs.issue_number }}"
          [ -n "$ISSUE_NUMBER" ] && gh issue edit "$ISSUE_NUMBER" --remove-label "cr:stage/spec" --add-label "cr:stage/design" 2>/dev/null || true

  # ── DESIGN: REVISE ────────────────────────────────────────────────────────

  revise-design:
    needs: [detect]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'revise-design'
    name: "Revise Design (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_PAT }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: ./.github/actions/cr-agent-setup
      - name: Revise design
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DESIGN_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          python -m medharness --dhf DHF ci design-cr --cr "$CR_ID" --pr "$PR_NUMBER" | tee /tmp/revise-design-out.json

      - name: Gate on design validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          STATUS=$(jq -r '.status // "unknown"' /tmp/revise-design-out.json)
          if [ "$STATUS" = "completed_with_errors" ]; then
            ERRORS=$(jq -r '.errors[] | "- **\(.field)**: \(.issue)\n  _Fix:_ \(.fix)"' /tmp/revise-design-out.json)
            BODY=$(printf '⚠️ **Design revision still has residual errors** for %s:\n\n%s' "$CR_ID" "$ERRORS")
            gh pr comment "$PR_NUMBER" --body "$BODY"
            exit 1
          fi

      - name: Commit revision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DHF/
          if ! git diff --staged --quiet; then
            COMMIT_BODY=""
            if [ -f /tmp/revise-design-out.json ]; then
              VALIDATION=$(jq -r '.validation // "unknown"' /tmp/revise-design-out.json)
              CORRECTIONS=$(jq -r '.corrections // 0' /tmp/revise-design-out.json)
              CREATED=$(jq -r '.items_changed.created | join(", ")' /tmp/revise-design-out.json)
              UPDATED=$(jq -r '.items_changed.updated | join(", ")' /tmp/revise-design-out.json)
              DELETED=$(jq -r '.items_changed.deleted | join(", ")' /tmp/revise-design-out.json)
              [ -n "$CREATED" ] && COMMIT_BODY="${COMMIT_BODY}Created: ${CREATED}"$'\n'
              [ -n "$UPDATED" ] && COMMIT_BODY="${COMMIT_BODY}Updated: ${UPDATED}"$'\n'
              [ -n "$DELETED" ] && COMMIT_BODY="${COMMIT_BODY}Deleted: ${DELETED}"$'\n'
              COMMIT_BODY="${COMMIT_BODY}Validation: ${VALIDATION} (${CORRECTIONS} correction(s))"
            fi
            if [ -n "$COMMIT_BODY" ]; then
              git commit -m "feat: revise design $CR_ID" -m "$COMMIT_BODY"
            else
              git commit -m "feat: revise design $CR_ID"
            fi
            git push
          fi

  # ── CODE: GENERATE ────────────────────────────────────────────────────────

  gen-code:
    needs: [detect]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'gen-code'
    name: "Generate Code (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_PAT }}
          ref: ${{ needs.detect.outputs.branch }}
      - name: Fetch base ref for diff
        run: git fetch origin main --depth 1
      - uses: ./.github/actions/cr-agent-setup
      - name: Generate implementation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DEVELOP_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          python -m medharness --dhf DHF ci develop-cr --cr "$CR_ID" | tee /tmp/develop-out.json

      - name: Gate on implementation validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          STATUS=$(jq -r '.status // "unknown"' /tmp/develop-out.json)
          if [ "$STATUS" = "completed_with_errors" ]; then
            ERRORS=$(jq -r '.errors[] | "- **\(.field)**: \(.issue)\n  _Fix:_ \(.fix)"' /tmp/develop-out.json)
            BODY=$(printf '⚠️ **Implementation validation has residual errors** for %s:\n\n%s\n\nReview the code and submit `changes_requested` to trigger an implementation revision.' "$CR_ID" "$ERRORS")
            gh pr comment "$PR_NUMBER" --body "$BODY"
            exit 1
          fi

      - name: Commit implementation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          COMMITTED=false
          if ! git diff --staged --quiet; then
            COMMIT_BODY=""
            if [ -f /tmp/develop-out.json ]; then
              VALIDATION=$(jq -r '.validation // "unknown"' /tmp/develop-out.json)
              CORRECTIONS=$(jq -r '.corrections // 0' /tmp/develop-out.json)
              CREATED_COUNT=$(jq -r '.files_changed.created | length' /tmp/develop-out.json)
              UPDATED_COUNT=$(jq -r '.files_changed.updated | length' /tmp/develop-out.json)
              DELETED_COUNT=$(jq -r '.files_changed.deleted | length' /tmp/develop-out.json)
              COMMIT_BODY="Files: +${CREATED_COUNT} ~${UPDATED_COUNT} -${DELETED_COUNT}"$'\n'
              COMMIT_BODY="${COMMIT_BODY}Validation: ${VALIDATION} (${CORRECTIONS} correction(s))"
            fi
            if [ -n "$COMMIT_BODY" ]; then
              git commit -m "feat: implement $CR_ID" -m "$COMMIT_BODY"
            else
              git commit -m "feat: implement $CR_ID"
            fi
            COMMITTED=true
          fi
          git fetch origin main --depth 1
          CODE_EXISTS=$(git diff origin/main -- . \
            ':(exclude)DHF/' ':(exclude)docs/cr-specs/' \
            | grep -c "^+" || echo "0")
          if [ "$COMMITTED" != "true" ] && [ "$CODE_EXISTS" = "0" ]; then
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ Implementation produced no code changes for $CR_ID — stage not advanced. Re-trigger via Actions → workflow_dispatch (stage: design) and check Claude logs."
            exit 1
          fi
          if [ "$COMMITTED" = "true" ]; then
            # Advance label BEFORE pushing so the PR-triggered CI run sees cr:stage/code
            # and the stage-gate allows dev tests (lint · typecheck · build) to run.
            gh pr edit "$PR_NUMBER" --remove-label "cr:stage/design" --add-label "cr:stage/code"
            gh pr ready "$PR_NUMBER"
            ISSUE_NUMBER="${{ needs.detect.outputs.issue_number }}"
            [ -n "$ISSUE_NUMBER" ] && gh issue edit "$ISSUE_NUMBER" \
              --remove-label "cr:stage/design" --add-label "cr:stage/code" 2>/dev/null || true
          fi
          echo "COMMITTED=$COMMITTED" >> "$GITHUB_ENV"
      - name: Push and wait for CI
        # We push manually here rather than letting the checkout push because
        # we need to watch the resulting CI run. Squash-merging the feat/* branch
        # later will inherit [skip ci] from intermediate commits, so cr-complete.yml
        # fires workflow_dispatch on main to re-trigger the full suite.
        if: env.COMMITTED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
          BRANCH: ${{ needs.detect.outputs.branch }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          LAST_RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow ci-pipeline.yml \
            --branch "$BRANCH" \
            --event pull_request \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || echo "")
          git push
          RUN_ID=""
          for i in $(seq 1 18); do
            CANDIDATE=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow ci-pipeline.yml \
              --branch "$BRANCH" \
              --event pull_request \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId' 2>/dev/null || echo "")
            if [ -n "$CANDIDATE" ] && [ "$CANDIDATE" != "$LAST_RUN_ID" ]; then
              RUN_ID="$CANDIDATE"
              break
            fi
            echo "Waiting for CI run to appear... ($i/18)"
            sleep 10
          done
          if [ -z "$RUN_ID" ]; then
            echo "::error::Timed out waiting for CI run on branch $BRANCH"
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ Timed out waiting for CI pipeline to start for $CR_ID. Check Actions → ci-pipeline.yml on branch \`$BRANCH\`."
            exit 1
          fi
          echo "Watching CI run $RUN_ID..."
          if ! gh run watch "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --exit-status; then
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/$RUN_ID"
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ CI pipeline failed for $CR_ID. See [CI run]($RUN_URL) for details. Fix failures and re-trigger via workflow_dispatch (stage: design)."
            exit 1
          fi

  # ── CODE: REVISE ──────────────────────────────────────────────────────────

  revise-code:
    needs: [detect]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'revise-code'
    name: "Revise Code (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_PAT }}
          ref: ${{ needs.detect.outputs.branch }}
      - name: Fetch base ref for diff
        run: git fetch origin main --depth 1
      - uses: ./.github/actions/cr-agent-setup
      - name: Revise implementation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DEVELOP_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          python -m medharness --dhf DHF ci develop-cr --cr "$CR_ID" --pr "$PR_NUMBER" | tee /tmp/revise-code-out.json

      - name: Gate on implementation validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          STATUS=$(jq -r '.status // "unknown"' /tmp/revise-code-out.json)
          if [ "$STATUS" = "completed_with_errors" ]; then
            ERRORS=$(jq -r '.errors[] | "- **\(.field)**: \(.issue)\n  _Fix:_ \(.fix)"' /tmp/revise-code-out.json)
            BODY=$(printf '⚠️ **Implementation revision still has residual errors** for %s:\n\n%s' "$CR_ID" "$ERRORS")
            gh pr comment "$PR_NUMBER" --body "$BODY"
            exit 1
          fi

      - name: Commit revision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            COMMIT_BODY=""
            if [ -f /tmp/revise-code-out.json ]; then
              VALIDATION=$(jq -r '.validation // "unknown"' /tmp/revise-code-out.json)
              CORRECTIONS=$(jq -r '.corrections // 0' /tmp/revise-code-out.json)
              CREATED_COUNT=$(jq -r '.files_changed.created | length' /tmp/revise-code-out.json)
              UPDATED_COUNT=$(jq -r '.files_changed.updated | length' /tmp/revise-code-out.json)
              DELETED_COUNT=$(jq -r '.files_changed.deleted | length' /tmp/revise-code-out.json)
              COMMIT_BODY="Files: +${CREATED_COUNT} ~${UPDATED_COUNT} -${DELETED_COUNT}"$'\n'
              COMMIT_BODY="${COMMIT_BODY}Validation: ${VALIDATION} (${CORRECTIONS} correction(s))"
            fi
            if [ -n "$COMMIT_BODY" ]; then
              git commit -m "fix: revise implementation $CR_ID" -m "$COMMIT_BODY"
            else
              git commit -m "fix: revise implementation $CR_ID"
            fi
            git push
          fi

  # ── CODE: APPROVED → READY TO MERGE ──────────────────────────────────────

  code-approved:
    needs: [detect]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'code-approved'
    name: "Code Approved — Ready to Merge"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment ready to merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ needs.detect.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --body "All stages complete — ready to merge."
