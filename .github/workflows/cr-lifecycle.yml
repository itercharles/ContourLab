name: WebTPS CR Lifecycle

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
    && format('{0} | re-run stage:{1}', inputs.cr_id, inputs.stage)
    || format('CR lifecycle | {0} | {1}',
        github.event.pull_request.head.ref,
        github.event.review.state || (github.event.pull_request.merged == true && 'merged' || 'closed')) }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      cr_id:
        description: 'CR ID (e.g. CR-034)'
        required: true
        type: string
      stage:
        description: 'Stage to re-run'
        required: true
        type: choice
        options: [cr, spec, design, code]

concurrency:
  group: cr-lifecycle-${{ github.event.pull_request.number || inputs.cr_id }}
  cancel-in-progress: true

# ── DETECT ────────────────────────────────────────────────────────────────────
# Determines what action to take and passes context to downstream jobs.
# action values: gen-spec | gen-design | gen-code | code-approved |
#                revise-spec | revise-design | revise-code |
#                cr-no-revise | cancel | noop

jobs:
  detect:
    if: |
      startsWith(github.event.pull_request.head.ref, 'feat/CR-') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      action: ${{ steps.ctx.outputs.action }}
      cr_id: ${{ steps.ctx.outputs.cr_id }}
      pr_number: ${{ steps.ctx.outputs.pr_number }}
      branch: ${{ steps.ctx.outputs.branch }}
      issue_number: ${{ steps.ctx.outputs.issue_number }}
    steps:
      - name: Determine action
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            CR_ID="${{ inputs.cr_id }}"
            STAGE="${{ inputs.stage }}"
            PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" --head "feat/$CR_ID" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$PR_NUMBER" ]; then
              echo "ERROR: no open PR found for feat/$CR_ID" >&2
              exit 1
            fi
            case "$STAGE" in
              cr)     ACTION="gen-spec" ;;
              spec)   ACTION="gen-design" ;;
              design) ACTION="gen-code" ;;
              code)   ACTION="code-approved" ;;
            esac
            echo "action=$ACTION" >> "$GITHUB_OUTPUT"
            echo "cr_id=$CR_ID" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "branch=feat/$CR_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="${{ github.event.pull_request.head.ref }}"
          CR_ID=$(echo "$BRANCH" | grep -oE 'CR-[0-9]+')
          PR_NUMBER="${{ github.event.pull_request.number }}"
          MERGED="${{ github.event.pull_request.merged }}"
          REVIEW_STATE="${{ github.event.review.state }}"

          echo "cr_id=$CR_ID" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[0].number // empty' 2>/dev/null || echo "")
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

          if [ "$EVENT" = "pull_request" ] && [ "$MERGED" = "true" ]; then
            echo "action=noop" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT" = "pull_request" ] && [ "$MERGED" = "false" ]; then
            echo "action=cancel" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          STAGE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels \
            --jq '.labels[].name | select(startswith("cr:stage/")) | ltrimstr("cr:stage/")' \
            | head -1)

          if [ -z "$STAGE" ]; then
            echo "ERROR: could not determine stage — no cr:stage/* label on PR $PR_NUMBER" >&2
            exit 1
          fi

          if [ "$REVIEW_STATE" = "approved" ]; then
            case "$STAGE" in
              cr)     ACTION="gen-spec" ;;
              spec)   ACTION="gen-design" ;;
              design) ACTION="gen-code" ;;
              code)   ACTION="code-approved" ;;
            esac
          elif [ "$REVIEW_STATE" = "changes_requested" ]; then
            case "$STAGE" in
              cr)     ACTION="cr-no-revise" ;;
              spec)   ACTION="revise-spec" ;;
              design) ACTION="revise-design" ;;
              code)   ACTION="revise-code" ;;
            esac
          else
            ACTION="noop"
          fi
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

  # ── CANCEL ────────────────────────────────────────────────────────────────

  cancel-cr:
    needs: [detect]
    if: needs.detect.outputs.action == 'cancel'
    name: "Cancel CR (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install medharness
        run: pip install "git+https://github.com/itercharles/MedHarness.git@feat/ci-generate-commands"
      - name: Cancel CR
        run: |
          CR_ID="${{ needs.detect.outputs.cr_id }}"
          BRANCH="${{ needs.detect.outputs.branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout "$BRANCH" -- "DHF/items/09_cr/$CR_ID.yaml"
          python -m medharness --dhf DHF dhf item transition \
            "$CR_ID" cancelled \
            --by "github-actions[bot]" --commit --push

  # ── CR STAGE: no AI revision ───────────────────────────────────────────────

  cr-no-revise:
    needs: [detect]
    if: needs.detect.outputs.action == 'cr-no-revise'
    name: "CR Stage: No AI Revision"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ needs.detect.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --body "The CR YAML (\`DHF/items/09_cr/${{ needs.detect.outputs.cr_id }}.yaml\`) is human-authored — there is no AI revision path at this stage. Please update it manually and re-approve."

  # ── SPEC: GENERATE ────────────────────────────────────────────────────────

  gen-spec:
    needs: [detect]
    if: needs.detect.outputs.action == 'gen-spec'
    name: "Generate Spec (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install medharness
        run: pip install "git+https://github.com/itercharles/MedHarness.git@feat/ci-generate-commands"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Fetch test evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          mkdir -p /tmp/test-artifacts
          RUN_ID=$(gh run list --workflow ci-pipeline.yml --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          [ -n "$RUN_ID" ] && gh run download "$RUN_ID" --name product-test-results \
            --dir /tmp/test-artifacts 2>/dev/null || true
      - name: Generate spec
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_ANALYZE_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          python -m medharness --dhf DHF ci analyze-cr --cr "$CR_ID" 2>&1 | tee /tmp/analyze-out.txt || true

      - name: Commit and advance to spec review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cr-specs/ DHF/items/
          COMMITTED=false
          if ! git diff --staged --quiet; then
            git commit -m "docs: spec for $CR_ID"
            git push
            COMMITTED=true
          fi
          SPEC_EXISTS=$(git diff origin/main -- "docs/cr-specs/${CR_ID}-Spec.md" | grep -c "^+" || echo "0")
          if [ "$COMMITTED" = "true" ] || [ "$SPEC_EXISTS" -gt "0" ]; then
            gh pr edit "$PR_NUMBER" --remove-label "cr:stage/cr" --add-label "cr:stage/spec"
            ISSUE_NUMBER="${{ needs.detect.outputs.issue_number }}"
            [ -n "$ISSUE_NUMBER" ] && gh issue edit "$ISSUE_NUMBER" --remove-label "cr:stage/cr" --add-label "cr:stage/spec" 2>/dev/null || true
          else
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ Spec generation produced no output for $CR_ID — stage not advanced. Re-trigger via Actions → workflow_dispatch (stage: cr) and check Claude logs."
            exit 1
          fi

  # ── SPEC: REVISE ──────────────────────────────────────────────────────────

  revise-spec:
    needs: [detect, gen-spec]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'revise-spec'
    name: "Revise Spec (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install medharness
        run: pip install "git+https://github.com/itercharles/MedHarness.git@feat/ci-generate-commands"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Revise spec
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_ANALYZE_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          python -m medharness --dhf DHF ci analyze-cr --cr "$CR_ID" --pr "$PR_NUMBER" 2>&1 | tee /tmp/revise-out.txt || true
      - name: Commit revision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cr-specs/ DHF/items/
          if ! git diff --staged --quiet; then
            git commit -m "docs: revise spec for $CR_ID"
            git push
          fi

  # ── DESIGN: GENERATE ──────────────────────────────────────────────────────

  gen-design:
    needs: [detect, revise-spec]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'gen-design'
    name: "Generate Design (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install medharness
        run: pip install "git+https://github.com/itercharles/MedHarness.git@feat/ci-generate-commands"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          if ! python -m medharness ci validate-spec \
            --cr "$CR_ID" \
            --spec "docs/cr-specs/${CR_ID}-Spec.md" \
            --dhf DHF; then
            gh pr comment "$PR_NUMBER" --body \
              "**Spec validation failed** for $CR_ID. Submit \`changes_requested\` to trigger a revision, then re-approve once the spec is updated."
            exit 1
          fi
      - name: Check if design needed
        id: design_check
        env:
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          AFFECTED=$(awk '
            /^affected_items:/ { found=1; next }
            found && /^  - /  { count++ }
            found && /^[a-z]/ { found=0 }
            END { print count+0 }
          ' "docs/cr-specs/${CR_ID}-Spec.md")
          if [ "$AFFECTED" = "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate design
        if: steps.design_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DESIGN_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          python -m medharness --dhf DHF ci design-cr --cr "$CR_ID" 2>&1 | tee /tmp/design-out.txt || true
      - name: Commit design
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          SKIP_DESIGN: ${{ steps.design_check.outputs.skip }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DHF/
          if ! git diff --staged --quiet; then
            git commit -m "feat: design $CR_ID"
            git push
          fi
      - name: Validate DHF traceability
        if: steps.design_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          if ! python -m medharness ci dhf-validate \
            --dhf DHF \
            --run-schema \
            --run-traceability \
            --coverage-pair UC:CRS \
            --coverage-pair CRS:SYS \
            --coverage-pair SYS:SRS \
            --coverage-pair SRS:SWDD \
            --coverage-pair SYS:SYSARCH \
            --coverage-pair RISK:RCM; then
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ DHF traceability check failed after design generation for $CR_ID. Correct the DHF items and re-approve to retry."
            exit 1
          fi
      - name: Advance to design review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
          SKIP_DESIGN: ${{ steps.design_check.outputs.skip }}
        run: |
          if [ "$SKIP_DESIGN" = "true" ]; then
            gh pr comment "$PR_NUMBER" \
              --body "No DHF items affected by $CR_ID — design stage skipped. Approve to proceed to implementation."
          fi
          gh pr edit "$PR_NUMBER" --remove-label "cr:stage/spec" --add-label "cr:stage/design"
          ISSUE_NUMBER="${{ needs.detect.outputs.issue_number }}"
          [ -n "$ISSUE_NUMBER" ] && gh issue edit "$ISSUE_NUMBER" --remove-label "cr:stage/spec" --add-label "cr:stage/design" 2>/dev/null || true

  # ── DESIGN: REVISE ────────────────────────────────────────────────────────

  revise-design:
    needs: [detect, gen-design]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'revise-design'
    name: "Revise Design (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install medharness
        run: pip install "git+https://github.com/itercharles/MedHarness.git@feat/ci-generate-commands"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Revise design
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DESIGN_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          python -m medharness --dhf DHF ci design-cr --cr "$CR_ID" --pr "$PR_NUMBER" 2>&1 | tee /tmp/revise-out.txt || true
      - name: Commit revision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DHF/
          if ! git diff --staged --quiet; then
            git commit -m "feat: revise design $CR_ID"
            git push
          fi

  # ── CODE: GENERATE ────────────────────────────────────────────────────────

  gen-code:
    needs: [detect, revise-design]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'gen-code'
    name: "Generate Code (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install medharness
        run: pip install "git+https://github.com/itercharles/MedHarness.git@feat/ci-generate-commands"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Generate implementation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DEVELOP_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          python -m medharness --dhf DHF ci develop-cr --cr "$CR_ID" 2>&1 | tee /tmp/develop-out.txt || true
      - name: Commit implementation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          COMMITTED=false
          if ! git diff --staged --quiet; then
            git commit -m "feat: implement $CR_ID"
            git push
            COMMITTED=true
          fi
          CODE_EXISTS=$(git diff origin/main -- . \
            ':(exclude)DHF/' ':(exclude)docs/cr-specs/' \
            | grep -c "^+" || echo "0")
          if [ "$COMMITTED" != "true" ] && [ "$CODE_EXISTS" = "0" ]; then
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ Implementation produced no code changes for $CR_ID — stage not advanced. Re-trigger via Actions → workflow_dispatch (stage: design) and check Claude logs."
            exit 1
          fi
      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
          BRANCH: ${{ needs.detect.outputs.branch }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          # Wait for ci-pipeline.yml to be queued (GitHub takes a few seconds)
          RUN_ID=""
          for attempt in $(seq 1 18); do
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow ci-pipeline.yml \
              --branch "$BRANCH" \
              --event pull_request \
              --limit 1 \
              --json databaseId,status \
              --jq 'map(select(.status != "completed")) | .[0].databaseId // empty' \
              2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && break
            echo "Waiting for CI run to appear... ($attempt/18)"
            sleep 10
          done
          if [ -z "$RUN_ID" ]; then
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ Could not find a running CI pipeline for $CR_ID — stage not advanced. Check Actions and re-trigger via workflow_dispatch (stage: design)."
            exit 1
          fi
          echo "Watching CI run $RUN_ID..."
          if ! gh run watch "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --exit-status; then
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/$RUN_ID"
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ CI pipeline failed for $CR_ID — stage not advanced. See [CI run]($RUN_URL) for details. Fix the failures and re-trigger via workflow_dispatch (stage: design)."
            exit 1
          fi
      - name: Advance to code review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "cr:stage/design" --add-label "cr:stage/code"
          gh pr ready "$PR_NUMBER"
          ISSUE_NUMBER="${{ needs.detect.outputs.issue_number }}"
          [ -n "$ISSUE_NUMBER" ] && gh issue edit "$ISSUE_NUMBER" --remove-label "cr:stage/design" --add-label "cr:stage/code" 2>/dev/null || true

  # ── CODE: REVISE ──────────────────────────────────────────────────────────

  revise-code:
    needs: [detect, gen-code]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'revise-code'
    name: "Revise Code (${{ needs.detect.outputs.cr_id }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.detect.outputs.branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install medharness
        run: pip install "git+https://github.com/itercharles/MedHarness.git@feat/ci-generate-commands"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Revise implementation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DEVELOP_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
          PR_NUMBER: ${{ needs.detect.outputs.pr_number }}
        run: |
          python -m medharness --dhf DHF ci develop-cr --cr "$CR_ID" --pr "$PR_NUMBER" 2>&1 | tee /tmp/revise-out.txt || true
      - name: Commit revision
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ needs.detect.outputs.cr_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "fix: revise implementation $CR_ID"
            git push
          fi

  # ── CODE: APPROVED → READY TO MERGE ──────────────────────────────────────

  code-approved:
    needs: [detect, revise-code]
    if: always() && needs.detect.result == 'success' && needs.detect.outputs.action == 'code-approved'
    name: "Code Approved — Ready to Merge"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment ready to merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ needs.detect.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --body "All stages complete — ready to merge."
