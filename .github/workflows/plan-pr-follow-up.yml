name: Plan PR Follow-up

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional plan PR number to inspect'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  follow-up:
    name: Summarize Plan PR Feedback
    runs-on: ubuntu-latest
    steps:
      - name: Inspect plan PR
        uses: actions/github-script@v7
        with:
          script: |
            const explicitPrNumber = core.getInput('pr_number');
            const candidatePrNumber =
              explicitPrNumber ||
              context.payload.pull_request?.number ||
              context.payload.issue?.number;

            if (!candidatePrNumber) {
              core.notice('No PR number available for plan follow-up run.');
              return;
            }

            const pull_number = Number(candidatePrNumber);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const [{ data: labels }, { data: comments }, { data: reviewComments }, { data: reviews }] = await Promise.all([
              github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: pull_number }),
              github.rest.issues.listComments({ owner, repo, issue_number: pull_number, per_page: 100 }),
              github.rest.pulls.listReviewComments({ owner, repo, pull_number, per_page: 100 }),
              github.rest.pulls.listReviews({ owner, repo, pull_number, per_page: 100 }),
            ]);

            const labelNames = new Set(labels.map((label) => label.name));
            if (!labelNames.has('pr:plan') || labelNames.has('ai:blocked')) {
              core.notice(`PR #${pull_number} is not an active plan PR.`);
              return;
            }

            const unresolvedIssueComments = comments.filter((comment) => !comment.user?.type || comment.user.type !== 'Bot');
            const unresolvedReviewComments = reviewComments.filter((comment) => !comment.user?.type || comment.user.type !== 'Bot');

            const latestReviewStates = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (!login) continue;
              latestReviewStates.set(login, review.state);
            }

            const summary = [
              `Plan PR #${pull_number}`,
              `Issue comments: ${unresolvedIssueComments.length}`,
              `Review comments: ${unresolvedReviewComments.length}`,
              `Active review states: ${JSON.stringify(Object.fromEntries(latestReviewStates))}`,
            ].join('\n');

            core.summary
              .addHeading(`Plan PR Follow-up #${pull_number}`)
              .addCodeBlock(summary)
              .write();

            if (unresolvedIssueComments.length + unresolvedReviewComments.length > 0 && !labelNames.has('ai:needs-human')) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pull_number,
                labels: ['ai:needs-human'],
              });
            }
