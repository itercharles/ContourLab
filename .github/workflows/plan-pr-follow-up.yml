name: Legacy Plan PR Follow-up

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional legacy WebTPS plan PR number to inspect manually'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  follow-up:
    name: Summarize Legacy Plan PR Feedback
    runs-on: ubuntu-latest
    steps:
      - name: Note legacy ownership
        uses: actions/github-script@v7
        with:
          script: |
            core.notice(
              'Plan PR follow-up ownership moved to WebTPS-DHF. ' +
              'This workflow remains only for manual inspection of legacy WebTPS plan PRs.'
            );

      - name: Inspect plan PR
        uses: actions/github-script@v7
        env:
          FEEDBACK_LIB_PATH: ${{ github.workspace }}/scripts/automation/lib/prFeedback.mjs
        with:
          script: |
            const { summarizePlanFeedback } = await import(`file://${process.env.FEEDBACK_LIB_PATH}`);
            const explicitPrNumber = core.getInput('pr_number');
            const candidatePrNumber =
              explicitPrNumber ||
              context.payload.pull_request?.number ||
              context.payload.issue?.number;

            if (!candidatePrNumber) {
              core.notice('No PR number available for plan follow-up run.');
              return;
            }

            const pull_number = Number(candidatePrNumber);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const [{ data: labels }, { data: comments }, { data: reviewComments }, { data: reviews }] = await Promise.all([
              github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: pull_number }),
              github.rest.issues.listComments({ owner, repo, issue_number: pull_number, per_page: 100 }),
              github.rest.pulls.listReviewComments({ owner, repo, pull_number, per_page: 100 }),
              github.rest.pulls.listReviews({ owner, repo, pull_number, per_page: 100 }),
            ]);

            const labelNames = new Set(labels.map((label) => label.name));
            if (!labelNames.has('pr:plan') || labelNames.has('ai:blocked')) {
              core.notice(`PR #${pull_number} is not an active plan PR.`);
              return;
            }

            const feedback = summarizePlanFeedback({
              issueComments: comments,
              reviewComments,
              reviews,
            });

            const summary = [
              `Plan PR #${pull_number}`,
              `Issue comments: ${feedback.humanIssueComments}`,
              `Review comments: ${feedback.humanReviewComments}`,
              `Active review states: ${JSON.stringify(feedback.activeReviewStates)}`,
            ].join('\n');

            core.summary
              .addHeading(`Plan PR Follow-up #${pull_number}`)
              .addCodeBlock(summary)
              .write();

            if (feedback.shouldLabelNeedsHuman && !labelNames.has('ai:needs-human')) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pull_number,
                labels: ['ai:needs-human'],
              });
            }
