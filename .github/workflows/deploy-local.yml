name: Deploy to Workstation

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Frontend ────────────────────────────────────────────────────────
      - name: Build frontend
        run: pnpm --filter @webtps/client build

      - name: Restart frontend (PM2)
        run: |
          pm2 describe webtps-client >$null 2>&1
          if ($LASTEXITCODE -eq 0) {
            pm2 restart webtps-client
          } else {
            pm2 start "pnpm --filter @webtps/client preview --host 127.0.0.1 --port 3000" --name webtps-client
          }
          pm2 save
        shell: pwsh

      # ── API ─────────────────────────────────────────────────────────────
      - name: Publish API
        run: >
          dotnet publish apps/api/api.csproj
          --configuration Release
          --output apps/api/publish
          --no-restore

      - name: Restart API (PM2)
        run: |
          pm2 describe webtps-api >$null 2>&1
          if ($LASTEXITCODE -eq 0) {
            pm2 restart webtps-api
          } else {
            pm2 start "dotnet apps/api/publish/WebTPS.Api.dll --urls http://127.0.0.1:4000" --name webtps-api
          }
          pm2 save
        shell: pwsh

      # ── Orthanc ─────────────────────────────────────────────────────────
      - name: Ensure DICOM repository is running
        run: pnpm repo:up

      # ── Smoke check ─────────────────────────────────────────────────────
      - name: Verify deployment
        run: pnpm local:doctor
