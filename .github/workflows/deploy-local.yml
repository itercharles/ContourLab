name: Deploy to Workstation

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Diagnose runner & PM2 env
        shell: pwsh
        run: |
          whoami
          echo "HOME=$env:HOME"
          echo "HOMEPATH=$env:HOMEPATH"
          echo "USERPROFILE=$env:USERPROFILE"
          echo "PM2_HOME=$env:PM2_HOME"

      - name: Set HOME and PM2_HOME (Windows)
        shell: pwsh
        run: |
          $env:HOME       = $env:USERPROFILE
          $env:HOMEDRIVE  = (Split-Path $env:USERPROFILE -Qualifier)
          $env:HOMEPATH   = (Split-Path $env:USERPROFILE -Leaf)
          $env:PM2_HOME   = Join-Path $env:USERPROFILE ".pm2"

          New-Item -ItemType Directory -Force $env:PM2_HOME | Out-Null

          echo "HOME=$env:HOME"
          echo "PM2_HOME=$env:PM2_HOME"

      - name: Add npm global bin to PATH
        run: echo "$env:APPDATA\npm" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Frontend ────────────────────────────────────────────────────────
      - name: Build frontend
        run: pnpm --filter @webtps/client build

      # Deployed build runs on ports 3001/4001 to avoid conflicting with
      # the local dev server on 3000/4000.
      - name: Restart frontend (PM2)
        env:
          WEBTPS_API_PORT: 4001
        run: |
          pm2 describe webtps-client >$null 2>&1
          if ($LASTEXITCODE -eq 0) {
            pm2 restart webtps-client --update-env
          } else {
            pm2 start "pnpm --filter @webtps/client preview --host 0.0.0.0 --port 3001" --name webtps-client
          }
          pm2 save
        shell: pwsh

      # ── API ─────────────────────────────────────────────────────────────
      - name: Publish API
        run: >
          dotnet publish apps/api/api.csproj
          --configuration Release
          --output apps/api/publish

      - name: Restart API (PM2)
        run: |
          pm2 describe webtps-api >$null 2>&1
          if ($LASTEXITCODE -eq 0) {
            pm2 restart webtps-api
          } else {
            pm2 start "dotnet apps/api/publish/WebTPS.Api.dll --urls http://0.0.0.0:4001" --name webtps-api
          }
          pm2 save
        shell: pwsh

      # ── Orthanc ─────────────────────────────────────────────────────────
      - name: Ensure DICOM repository is running
        run: pnpm repo:up

      # ── Smoke check ─────────────────────────────────────────────────────
      - name: Verify deployment
        run: pnpm local:doctor
