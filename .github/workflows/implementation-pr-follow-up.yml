name: Implementation PR Follow-up

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional implementation PR number to inspect'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  follow-up:
    name: Summarize Implementation PR Feedback
    runs-on: ubuntu-latest
    steps:
      - name: Inspect implementation PR
        uses: actions/github-script@v7
        env:
          FEEDBACK_LIB_PATH: ${{ github.workspace }}/scripts/automation/lib/prFeedback.mjs
        with:
          script: |
            const {
              summarizeImplementationFeedback,
              renderImplementationFollowUpComment,
            } = await import(`file://${process.env.FEEDBACK_LIB_PATH}`);
            const explicitPrNumber = core.getInput('pr_number');
            const candidatePrNumber =
              explicitPrNumber ||
              context.payload.pull_request?.number ||
              context.payload.issue?.number;

            if (!candidatePrNumber) {
              core.notice('No PR number available for implementation follow-up run.');
              return;
            }

            const pull_number = Number(candidatePrNumber);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const [{ data: labels }, { data: comments }, { data: reviewComments }, { data: reviews }] = await Promise.all([
              github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: pull_number }),
              github.rest.issues.listComments({ owner, repo, issue_number: pull_number, per_page: 100 }),
              github.rest.pulls.listReviewComments({ owner, repo, pull_number, per_page: 100 }),
              github.rest.pulls.listReviews({ owner, repo, pull_number, per_page: 100 }),
            ]);

            const labelNames = new Set(labels.map((label) => label.name));
            if (!labelNames.has('pr:implementation') || labelNames.has('ai:blocked')) {
              core.notice(`PR #${pull_number} is not an active implementation PR.`);
              return;
            }

            const feedback = summarizeImplementationFeedback({
              issueComments: comments,
              reviewComments,
              reviews,
            });

            const summary = [
              `Implementation PR #${pull_number}`,
              `Issue comments: ${feedback.humanIssueComments}`,
              `Review comments: ${feedback.humanReviewComments}`,
              `Active review states: ${JSON.stringify(feedback.activeReviewStates)}`,
            ].join('\n');

            core.summary
              .addHeading(`Implementation PR Follow-up #${pull_number}`)
              .addCodeBlock(summary)
              .write();

            const marker = '<!-- ai-follow-up:implementation -->';
            const existingBotComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && String(comment.body || '').includes(marker)
            );
            const commentBody = renderImplementationFollowUpComment({
              prNumber: pull_number,
              feedback,
            });

            if (existingBotComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingBotComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: commentBody,
              });
            }

            if (feedback.shouldLabelNeedsHuman) {
              if (!labelNames.has('ai:needs-human')) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pull_number,
                  labels: ['ai:needs-human'],
                });
              }
            } else if (labelNames.has('ai:needs-human')) {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pull_number,
                name: 'ai:needs-human',
              }).catch(() => {});
            }

            if (feedback.shouldLabelReplan) {
              if (!labelNames.has('ai:replan')) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pull_number,
                  labels: ['ai:replan'],
                });
              }
            } else if (labelNames.has('ai:replan')) {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pull_number,
                name: 'ai:replan',
              }).catch(() => {});
            }
