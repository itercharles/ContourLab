name: WebTPS CR Development Automation

run-name: CR development | ${{ github.event.pull_request.title || github.event.inputs.cr_id || github.ref_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      cr_id:
        description: 'CR ID (e.g. CR-030)'
        required: true
        type: string
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]

jobs:
  develop:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested' && startsWith(github.event.pull_request.head.ref, 'feat/CR-')) ||
      (github.event_name == 'pull_request' && !github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'feat/CR-'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine mode and CR ID
        id: ctx
        env:
          EVENT: ${{ github.event_name }}
          MERGED: ${{ github.event.pull_request.merged }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          DISPATCH_CR_ID: ${{ github.event.inputs.cr_id }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "mode=new" >> "$GITHUB_OUTPUT"
            echo "cr_id=$DISPATCH_CR_ID" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "pull_request" ] && [ "$MERGED" = "false" ]; then
            CR_ID=$(echo "$HEAD_REF" | grep -oE 'CR-[0-9]+')
            echo "mode=cancel" >> "$GITHUB_OUTPUT"
            echo "cr_id=$CR_ID" >> "$GITHUB_OUTPUT"
          else
            CR_ID=$(echo "$HEAD_REF" | grep -oE 'CR-[0-9]+')
            echo "mode=iterate" >> "$GITHUB_OUTPUT"
            echo "cr_id=$CR_ID" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install medharness
        run: pip install medharness

      - name: Cancel — transition CR and dispatch to cr-design
        if: steps.ctx.outputs.mode == 'cancel'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          git checkout main
          python -m medharness --dhf DHF dhf item transition \
            "$CR_ID" cancelled \
            --by "github-actions[bot]" --commit --push
          printf '{"event_type":"cr-impl-cancelled","client_payload":{"cr_id":"%s"}}' "$CR_ID" | \
            gh api repos/${{ github.repository }}/dispatches --method POST --input -

      - uses: actions/setup-node@v4
        if: steps.ctx.outputs.mode != 'cancel'
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.ctx.outputs.mode != 'cancel'
        run: npm install -g @anthropic-ai/claude-code

      - name: Transition CR to implementing
        if: steps.ctx.outputs.mode == 'new'
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          python -m medharness --dhf DHF dhf item transition "$CR_ID" implementing \
            --by "github-actions[bot]" --commit --push

      - name: Pre-compute develop context
        if: steps.ctx.outputs.mode == 'new'
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          DHF_CONTEXT=$(python -m medharness --dhf DHF dhf context for-stage develop \
            --cr "$CR_ID" \
            --spec "docs/cr-specs/${CR_ID}-Spec.md" 2>/dev/null || echo '{}')
          echo "DHF_CONTEXT=$DHF_CONTEXT" >> "$GITHUB_ENV"
          mkdir -p /tmp/dhf-context
          python3 - <<'PYEOF' 2>/dev/null || true
import json, os
d = json.loads(os.environ.get('DHF_CONTEXT', '{}'))
spec_path = f"/tmp/dhf-context/{os.environ['CR_ID']}-Spec.md"
open(spec_path, 'w').write(d.get('spec_text', ''))
PYEOF
          python -m medharness --dhf DHF dhf item get "$CR_ID" \
            > "/tmp/dhf-context/$CR_ID.json" 2>/dev/null || true
          echo "--- DHF_CONTEXT ---" && echo "$DHF_CONTEXT" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print(d.get('stage','?'),'|',d.get('cr',{}).get('title','?'))" || true
          echo "--- Spec (first 30 lines) ---" && head -30 "/tmp/dhf-context/$CR_ID-Spec.md" || true

      - name: Read session ID for iteration
        if: steps.ctx.outputs.mode == 'iterate'
        id: session
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          SESSION_ID=$(python -m medharness ci claude-session get "$PR_NUMBER" 2>/dev/null || echo "")
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"

      - name: Collect review feedback
        if: steps.ctx.outputs.mode == 'iterate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" > /tmp/review-comments.json
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" > /tmp/reviews.json

      - name: Implement CR
        if: steps.ctx.outputs.mode == 'new'
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DEVELOP_MODEL }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
          DHF_CONTEXT: ${{ env.DHF_CONTEXT }}
        run: |
          [ -n "$ANTHROPIC_MODEL" ] || unset ANTHROPIC_MODEL
          PROMPT="Implement $CR_ID in this WebTPS repository.

          The DHF context is in the DHF_CONTEXT env var (JSON: cr, spec_plan, affected_items).
          The approved spec is at /tmp/dhf-context/$CR_ID-Spec.md — read it first.

          Implement exactly what the spec describes.
          Make all required code changes. Do not create test files unless the spec requires it.
          Do not commit — the workflow will commit after."

          echo "=== PROMPT ===" && echo "$PROMPT" && echo "=== CLAUDE OUTPUT ==="
          SESSION_ID=$(uuidgen)
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          claude -p --dangerously-skip-permissions --session-id "$SESSION_ID" "$PROMPT" 2>&1 | tee /tmp/claude-out.txt || true
          echo "Automated implementation for $CR_ID." > /tmp/claude-result.txt

      - name: Revise implementation
        if: steps.ctx.outputs.mode == 'iterate'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DEVELOP_MODEL }}
          SESSION_ID: ${{ steps.session.outputs.session_id }}
        run: |
          [ -n "$ANTHROPIC_MODEL" ] || unset ANTHROPIC_MODEL
          if [ -n "$SESSION_ID" ]; then
            claude --resume "$SESSION_ID" -p --dangerously-skip-permissions \
              "Revise the implementation based on review feedback in /tmp/review-comments.json and /tmp/reviews.json. Do not commit."
          else
            claude -p --dangerously-skip-permissions \
              "Revise the implementation on this branch based on review feedback in /tmp/review-comments.json and /tmp/reviews.json. Do not commit."
          fi

      - name: Push implementation branch
        if: steps.ctx.outputs.mode == 'new'
        id: push
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          git checkout -B "feat/$CR_ID"
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No code changes made by Claude — skipping PR."
          else
            git commit -m "feat: implement $CR_ID"
            git push --force --set-upstream origin "feat/$CR_ID"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit revised implementation
        if: steps.ctx.outputs.mode == 'iterate'
        run: |
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "fix: revise implementation from review feedback"
            git push
          fi

      - name: Open implementation PR and store session ID
        if: steps.ctx.outputs.mode == 'new' && steps.push.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
          SESSION_ID: ${{ steps.gen.outputs.session_id }}
        run: |
          EXISTING=$(gh pr list --head "feat/$CR_ID" --json number --jq '.[0].number' 2>/dev/null || echo "")
          PR_BODY=$(cat /tmp/claude-result.txt 2>/dev/null || echo "Automated implementation for $CR_ID.")
          if [ -z "$EXISTING" ]; then
            PR_URL=$(gh pr create \
              --head "feat/$CR_ID" \
              --base main \
              --title "feat($CR_ID): implement approved spec" \
              --body "$PR_BODY")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          else
            PR_NUMBER=$EXISTING
            PR_URL="https://github.com/${{ github.repository }}/pull/$PR_NUMBER"
          fi
          if [ -n "$SESSION_ID" ]; then
            python -m medharness ci claude-session put "$PR_NUMBER" "$SESSION_ID"
          fi
          ISSUE_URL=$(python3 - <<'PYEOF'
import json, os, re
try:
    path = f"/tmp/dhf-context/{os.environ['CR_ID']}.json"
    item = json.load(open(path))
    description = str(item.get("description") or "")
    match = re.search(r"Source issue: (https://\S+)", description)
    print(match.group(1) if match else "")
except Exception:
    print("")
PYEOF
          )
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue comment "$ISSUE_NUMBER" \
              --body "**Stage: Implementation** — PR opened for review: $PR_URL"
          fi
