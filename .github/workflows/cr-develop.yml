name: WebTPS CR Development Automation

run-name: CR development | ${{ github.event.pull_request.title || github.event.client_payload.cr_id || github.ref_name }}

on:
  repository_dispatch:
    types: [cr-design-merged]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]

jobs:
  develop:
    if: |
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested' && startsWith(github.event.pull_request.head.ref, 'feat/CR-')) ||
      (github.event_name == 'pull_request' && !github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'feat/CR-'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine mode and CR ID
        id: ctx
        env:
          EVENT: ${{ github.event_name }}
          MERGED: ${{ github.event.pull_request.merged }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          DISPATCH_CR_ID: ${{ github.event.client_payload.cr_id }}
        run: |
          if [ "$EVENT" = "repository_dispatch" ]; then
            echo "mode=new" >> "$GITHUB_OUTPUT"
            echo "cr_id=$DISPATCH_CR_ID" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "pull_request" ] && [ "$MERGED" = "false" ]; then
            CR_ID=$(echo "$HEAD_REF" | grep -oE 'CR-[0-9]+')
            echo "mode=cancel" >> "$GITHUB_OUTPUT"
            echo "cr_id=$CR_ID" >> "$GITHUB_OUTPUT"
          else
            CR_ID=$(echo "$HEAD_REF" | grep -oE 'CR-[0-9]+')
            echo "mode=iterate" >> "$GITHUB_OUTPUT"
            echo "cr_id=$CR_ID" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cancel — notify WebTPS-DHF
        if: steps.ctx.outputs.mode == 'cancel'
        env:
          GH_TOKEN: ${{ secrets.PRODUCT_REPO_TOKEN }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          echo '{"event_type":"cr-impl-cancelled","client_payload":{"cr_id":"'"$CR_ID"'"}}' | \
            gh api repos/itercharles/WebTPS-DHF/dispatches --method POST --input -

      - uses: actions/setup-node@v4
        if: steps.ctx.outputs.mode != 'cancel'
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.ctx.outputs.mode != 'cancel'
        run: npm install -g @anthropic-ai/claude-code

      - name: Transition CR to implementing in DHF
        if: steps.ctx.outputs.mode == 'new'
        env:
          GH_TOKEN: ${{ secrets.PRODUCT_REPO_TOKEN }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/itercharles/WebTPS-DHF.git" /tmp/dhf-repo
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          pip install -r /tmp/dhf-repo/requirements.txt -q
          python -m dhf_util --dhf /tmp/dhf-repo/DHF item transition "$CR_ID" implementing --by "github-actions[bot]"
          cd /tmp/dhf-repo
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: transition $CR_ID to implementing [skip ci]"
            git push
          fi

      - name: Read CR context from DHF adapter
        if: steps.ctx.outputs.mode == 'new'
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          python -m compliantflow --dhf /tmp/dhf-repo/DHF dhf context implementation \
            --cr "$CR_ID" \
            --out-dir /tmp/dhf-context
          echo "--- CR ---" && cat "/tmp/dhf-context/$CR_ID.json" || true
          echo "--- Spec (first 30 lines) ---" && head -30 "/tmp/dhf-context/$CR_ID-Spec.md" || true

      - name: Read session ID for iteration
        if: steps.ctx.outputs.mode == 'iterate'
        id: session
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          SESSION_ID=$(gh pr view $PR_NUMBER --json comments \
            --jq '[.comments[].body | select(startswith("<!-- claude-session:"))] | last | ltrimstr("<!-- claude-session: ") | rtrimstr(" -->")' \
            2>/dev/null || echo "")
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"

      - name: Collect review feedback
        if: steps.ctx.outputs.mode == 'iterate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" > /tmp/review-comments.json
          gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" > /tmp/reviews.json

      - name: Implement CR
        if: steps.ctx.outputs.mode == 'new'
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DEVELOP_MODEL }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
        run: |
          [ -n "$ANTHROPIC_MODEL" ] || unset ANTHROPIC_MODEL
          PROMPT="Implement $CR_ID in this WebTPS repository.

          The CR and spec are at:
          - /tmp/dhf-context/$CR_ID.json  (the change request)
          - /tmp/dhf-context/$CR_ID-Spec.md  (the approved technical spec)

          Read those files first, then implement exactly what the spec describes.
          Make all required code changes. Do not create test files unless the spec requires it.
          Do not commit — the workflow will commit after."

          echo "=== PROMPT ===" && echo "$PROMPT" && echo "=== CLAUDE OUTPUT ==="
          claude -p --dangerously-skip-permissions --output-format json "$PROMPT" 2>&1 | tee /tmp/claude-out.json || true
          python3 - <<'PYEOF'
          import json
          data = open('/tmp/claude-out.json').read().strip().split('\n')
          session_id, result_body = '', 'Automated implementation for this CR.'
          for line in data:
              try:
                  obj = json.loads(line)
                  if obj.get('session_id'): session_id = obj['session_id']
                  if obj.get('type') == 'result' and obj.get('result'): result_body = obj['result']
              except: pass
          open('/tmp/claude-session-id.txt', 'w').write(session_id)
          open('/tmp/claude-result.txt', 'w').write(result_body[:8000])
          PYEOF
          SESSION_ID=$(cat /tmp/claude-session-id.txt)
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"

      - name: Revise implementation
        if: steps.ctx.outputs.mode == 'iterate'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_DEVELOP_MODEL }}
          SESSION_ID: ${{ steps.session.outputs.session_id }}
        run: |
          [ -n "$ANTHROPIC_MODEL" ] || unset ANTHROPIC_MODEL
          if [ -n "$SESSION_ID" ]; then
            claude --resume "$SESSION_ID" -p --dangerously-skip-permissions \
              "Revise the implementation based on review feedback in /tmp/review-comments.json and /tmp/reviews.json. Do not commit."
          else
            claude -p --dangerously-skip-permissions \
              "Revise the implementation on this branch based on review feedback in /tmp/review-comments.json and /tmp/reviews.json. Do not commit."
          fi

      - name: Push implementation branch
        if: steps.ctx.outputs.mode == 'new'
        id: push
        env:
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
          GH_TOKEN: ${{ secrets.PRODUCT_REPO_TOKEN }}
        run: |
          git checkout -B "feat/$CR_ID"
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/itercharles/WebTPS.git"
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No code changes made by Claude — skipping PR."
          else
            git commit -m "feat: implement $CR_ID"
            git push --force --set-upstream origin "feat/$CR_ID"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit revised implementation
        if: steps.ctx.outputs.mode == 'iterate'
        env:
          GH_TOKEN: ${{ secrets.PRODUCT_REPO_TOKEN }}
        run: |
          git config user.name "GitHub Actions [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/itercharles/WebTPS.git"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "fix: revise implementation from review feedback"
            git push
          fi

      - name: Open implementation PR and store session ID
        if: steps.ctx.outputs.mode == 'new' && steps.push.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.PRODUCT_REPO_TOKEN }}
          CR_ID: ${{ steps.ctx.outputs.cr_id }}
          SESSION_ID: ${{ steps.gen.outputs.session_id }}
        run: |
          EXISTING=$(gh pr list --head "feat/$CR_ID" --json number --jq '.[0].number' 2>/dev/null || echo "")
          PR_BODY=$(cat /tmp/claude-result.txt 2>/dev/null || echo "Automated implementation for $CR_ID.")
          if [ -z "$EXISTING" ]; then
            PR_URL=$(gh pr create \
              --head "feat/$CR_ID" \
              --base main \
              --title "feat($CR_ID): implement approved spec" \
              --body "$PR_BODY")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          else
            PR_NUMBER=$EXISTING
            PR_URL="https://github.com/itercharles/WebTPS/pull/$PR_NUMBER"
          fi
          if [ -n "$SESSION_ID" ]; then
            gh pr comment $PR_NUMBER --body "<!-- claude-session: $SESSION_ID -->"
          fi
          # Comment on source issue
          ISSUE_URL=$(python3 - <<'PYEOF'
          import json
          import os
          import re

          try:
              path = f"/tmp/dhf-context/{os.environ['CR_ID']}.json"
              item = json.load(open(path))
              description = str(item.get("description") or "")
              match = re.search(r"Source issue: (https://\S+)", description)
              print(match.group(1) if match else "")
          except Exception:
              print("")
          PYEOF
          )
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue comment "$ISSUE_NUMBER" \
              --body "**Stage: Implementation** — PR opened for review: $PR_URL"
          fi
