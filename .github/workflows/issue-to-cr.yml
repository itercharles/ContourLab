name: WebTPS CR Issue Intake

run-name: "CR Issue Intake | #${{ github.event.issue.number }} | ${{ github.event.issue.title }}"

on:
  issues:
    types: [milestoned]

concurrency:
  group: issue-to-cr-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write
  pull-requests: write

jobs:
  create-cr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: ./.github/actions/cr-agent-setup

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare CR from issue
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CR_ANALYZE_MODEL }}
        run: |
          medharness cr workflow intake-github-issue-ci \
            --event "$GITHUB_EVENT_PATH" \
            --dhf-repo . \
            --source-repo "${{ github.repository }}" \
            --marker-name webtps-cr \
            --write \
            --output /tmp/issue-to-cr.json \
            --github-output "$GITHUB_OUTPUT"
          cat /tmp/issue-to-cr.json

      - name: Stop when issue is not ready for CR intake
        if: steps.prepare.outputs.should_create != 'true'
        run: echo "${{ steps.prepare.outputs.reason }}"

      - name: Create stage labels
        if: steps.prepare.outputs.should_create == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "cr:stage/cr"     --color "0075ca" --description "CR stage: awaiting CR review"     2>/dev/null || true
          gh label create "cr:stage/spec"   --color "e4e669" --description "CR stage: awaiting spec review"   2>/dev/null || true
          gh label create "cr:stage/design" --color "d93f0b" --description "CR stage: awaiting design review" 2>/dev/null || true
          gh label create "cr:stage/code"   --color "0e8a16" --description "CR stage: awaiting code review"   2>/dev/null || true

      - name: Open feat branch and Draft PR
        if: steps.prepare.outputs.should_create == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          CR_ID=$(jq -r '.cr_id' /tmp/issue-to-cr.json)
          BRANCH="feat/$CR_ID"
          SPEC_GENERATED=$(jq -r '.spec_generated // false' /tmp/issue-to-cr.json)
          SPEC_STATUS=$(jq -r '.spec_status // ""' /tmp/issue-to-cr.json)
          SPEC_ERROR=$(jq -r '.spec_error // ""' /tmp/issue-to-cr.json)

          git checkout -b "$BRANCH"
          git add DHF/items/
          if [ "$SPEC_GENERATED" = "true" ]; then
            git add docs/cr-specs/
          fi
          git commit -m "cr: intake $CR_ID"
          git push --force-with-lease --set-upstream origin "$BRANCH"

          {
            echo "Closes #${{ github.event.issue.number }}"
            echo ""
            echo "**Stage 1 of 4 — CR Review**"
            echo "Review the CR definition in \`DHF/items/09_cr/$CR_ID.yaml\`, then approve to trigger AI spec generation."
            if [ "$SPEC_GENERATED" = "true" ]; then
              echo ""
              echo "**Draft spec pre-generated** during intake (\`$SPEC_STATUS\`). Review \`docs/cr-specs/$CR_ID-Spec.md\` before approving — approving will advance directly to AI design generation."
            elif [ -n "$SPEC_ERROR" ]; then
              echo ""
              echo "_Note: Draft spec generation was attempted but did not complete (\`$SPEC_ERROR\`). Approving will trigger fresh spec generation._"
            fi
          } > /tmp/pr-body.md
          PR_URL=$(gh pr view "$BRANCH" --json url,state -q 'select(.state=="OPEN") | .url' 2>/dev/null || true)
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --head "$BRANCH" \
              --base main \
              --draft \
              --title "feat($CR_ID): $ISSUE_TITLE" \
              --body-file /tmp/pr-body.md \
              --label "cr:stage/cr")
          fi

          gh issue edit "${{ github.event.issue.number }}" --add-label "cr:stage/cr"

          python -m medharness --dhf DHF dhf item transition "$CR_ID" in_review \
            --by "github-actions[bot]" --commit --push

          {
            echo "CR intake complete: **$CR_ID** — review PR: $PR_URL"
            if [ "$SPEC_GENERATED" = "true" ]; then
              echo ""
              echo "Draft spec pre-generated during intake (status: \`$SPEC_STATUS\`). Review \`docs/cr-specs/$CR_ID-Spec.md\` in the PR."
            fi
            echo ""
            echo "<!-- webtps-cr: $CR_ID -->"
            echo "<!-- webtps-cr-pr: $PR_URL -->"
          } | gh issue comment "${{ github.event.issue.number }}" --body-file -
