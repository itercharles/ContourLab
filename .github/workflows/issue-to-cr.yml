name: WebTPS CR Issue Intake

run-name: "CR Issue Intake | #${{ github.event.issue.number }} | ${{ github.event.issue.title }}"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types: [milestoned]

concurrency:
  group: issue-to-cr
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write
  pull-requests: write

jobs:
  create-cr:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install medharness
        run: pip install medharness

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare CR from issue
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          medharness cr workflow intake-github-issue-ci \
            --event "$GITHUB_EVENT_PATH" \
            --dhf-repo . \
            --source-repo "${{ github.repository }}" \
            --marker-name webtps-cr \
            --write \
            --create-branch \
            --open-pr \
            --comment-source-issue \
            --output /tmp/issue-to-cr.json \
            --github-output "$GITHUB_OUTPUT"
          cat /tmp/issue-to-cr.json

      - name: Stop when issue is not ready for CR intake
        if: steps.prepare.outputs.should_create != 'true'
        run: echo "${{ steps.prepare.outputs.reason }}"

      - name: Create CR PR when intake did not open one
        if: steps.prepare.outputs.should_create == 'true' && steps.prepare.outputs.pr_url == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_BRANCH: ${{ steps.prepare.outputs.branch }}
          CR_TITLE: ${{ steps.prepare.outputs.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          EXISTING_PR=$(gh pr list \
            --head "$CR_BRANCH" \
            --state all \
            --json url \
            --jq '.[0].url // ""')

          if [ -n "$EXISTING_PR" ]; then
            PR_URL="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --head "$CR_BRANCH" \
              --base main \
              --title "$CR_TITLE" \
              --body "CR intake PR for issue #$ISSUE_NUMBER.")
          fi

          gh issue comment "$ISSUE_NUMBER" \
            --body "CR PR created: $PR_URL"

      - name: Wait for CR PR merge before analysis
        if: steps.prepare.outputs.should_create == 'true'
        run: |
          echo "CR intake created a CR branch/PR."
          echo "Analysis starts when that CR intake PR is merged into main."
