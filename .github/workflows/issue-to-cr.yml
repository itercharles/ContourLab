name: WebTPS CR Issue Intake

run-name: "CR Issue Intake | #${{ github.event.issue.number }} | ${{ github.event.issue.title }}"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types: [milestoned]

concurrency:
  group: issue-to-cr
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  create-cr:
    runs-on: ubuntu-latest
    steps:
      - name: Check out WebTPS
        uses: actions/checkout@v4

      - name: Check out DHF repo
        uses: actions/checkout@v4
        with:
          repository: itercharles/WebTPS-DHF
          token: ${{ secrets.PRODUCT_REPO_TOKEN }}
          path: dhf
          fetch-depth: 0

      - name: Install DHF utility dependencies
        env:
          PRODUCT_REPO_TOKEN: ${{ secrets.PRODUCT_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${PRODUCT_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          python -m pip install --upgrade pip
          pip install -r dhf/requirements.txt

      - name: Configure git identity for DHF commits
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare CR from issue
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.PRODUCT_REPO_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          medharness cr workflow intake-github-issue-ci \
            --event "$GITHUB_EVENT_PATH" \
            --dhf-repo dhf \
            --source-repo "${{ github.repository }}" \
            --marker-name webtps-cr \
            --write \
            --create-branch \
            --open-pr \
            --comment-source-issue \
            --output /tmp/issue-to-cr.json \
            --github-output "$GITHUB_OUTPUT"
          cat /tmp/issue-to-cr.json

      - name: Stop when issue is not ready for CR intake
        if: steps.prepare.outputs.should_create != 'true'
        run: echo "${{ steps.prepare.outputs.reason }}"

      - name: Trigger CR analysis in DHF
        if: steps.prepare.outputs.should_create == 'true'
        env:
          GH_TOKEN: ${{ secrets.PRODUCT_REPO_TOKEN }}
          CR_ID: ${{ steps.prepare.outputs.cr_id }}
        run: |
          gh workflow run cr-analyze.yml --repo itercharles/WebTPS-DHF \
            --field cr_id="$CR_ID"
